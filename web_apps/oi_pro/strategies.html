<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategy Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #030712;
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-strong {
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }

        .status-pulse {
            position: relative;
        }

        .status-pulse::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: inherit;
            border-radius: inherit;
            animation: pulse-ring 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.95);
                opacity: 0.7;
            }

            50% {
                transform: scale(1.5);
                opacity: 0;
            }

            100% {
                transform: scale(0.95);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function StrategyCommandCenter() {
            const [strategies, setStrategies] = useState([]);
            const [loading, setLoading] = useState(true);
            const [configModal, setConfigModal] = useState({ show: false, strategyId: null, config: {} });
            const [savingConfig, setSavingConfig] = useState(false);
            const [expandedStrategies, setExpandedStrategies] = useState({});
            const [logs, setLogs] = useState({});

            // Fetch strategies every 3 seconds for status updates
            useEffect(() => {
                fetchStrategies();
                const interval = setInterval(fetchStrategies, 3000);
                return () => clearInterval(interval);
            }, []);

            const fetchStrategies = () => {
                fetch('/api/strategies')
                    .then(res => res.json())
                    .then(data => {
                        setStrategies(data.strategies);
                        setLoading(false);
                    })
                    .catch(err => console.error("Failed to fetch strategies", err));
            };

            const handleStart = (id) => {
                fetch(`/api/strategies/start/${id}`, { method: 'POST' })
                    .then(res => res.json())
                    .then(() => fetchStrategies());
            };

            const handleStop = (id) => {
                fetch(`/api/strategies/stop/${id}`, { method: 'POST' })
                    .then(res => res.json())
                    .then(() => fetchStrategies());
            };

            const openConfig = (id) => {
                fetch(`/api/strategies/config/${id}`)
                    .then(res => res.json())
                    .then(data => {
                        setConfigModal({ show: true, strategyId: id, config: data.config });
                    });
            };

            const saveConfig = () => {
                setSavingConfig(true);
                fetch(`/api/strategies/config/${configModal.strategyId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(configModal.config)
                })
                    .then(res => res.json())
                    .then(() => {
                        setSavingConfig(false);
                        setConfigModal({ show: false, strategyId: null, config: {} });
                    });
            };

            const updateConfigField = (key, value) => {
                setConfigModal(prev => ({
                    ...prev,
                    config: { ...prev.config, [key]: value }
                }));
            };

            const toggleDetails = (id) => {
                setExpandedStrategies(prev => {
                    const newState = { ...prev, [id]: !prev[id] };
                    if (newState[id]) {
                        fetchLogs(id);
                    }
                    return newState;
                });
            };

            const fetchLogs = (id) => {
                fetch(`/api/strategies/logs/${id}`)
                    .then(res => res.json())
                    .then(data => {
                        setLogs(prev => ({ ...prev, [id]: data.logs }));
                    });
            };

            // Poll logs for expanded strategies
            useEffect(() => {
                const interval = setInterval(() => {
                    Object.keys(expandedStrategies).forEach(id => {
                        if (expandedStrategies[id]) {
                            fetchLogs(id);
                        }
                    });
                }, 2000); // Poll every 2 seconds
                return () => clearInterval(interval);
            }, [expandedStrategies]);

            return (
                <div className="min-h-screen bg-[#030712] text-slate-300 antialiased selection:bg-emerald-500/30">
                    {/* Navigation Sidebar */}
                    <nav className="fixed left-0 top-0 h-full w-20 bg-[#0b0f1a] border-r border-slate-800/40 flex flex-col items-center py-10 gap-8 z-50">
                        <a href="/" className="w-10 h-10 bg-slate-800/50 hover:bg-emerald-500/20 rounded-xl flex items-center justify-center text-slate-400 hover:text-emerald-400 transition-all hover:scale-105 group" title="Dashboard">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                        </a>
                        <a href="/pop" className="w-10 h-10 bg-slate-800/50 hover:bg-emerald-500/20 rounded-xl flex items-center justify-center text-slate-400 hover:text-emerald-400 transition-all hover:scale-105 group" title="Premium vs PoP Analysis">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                        </a>
                        <a href="/pcr" className="w-10 h-10 bg-slate-800/50 hover:bg-emerald-500/20 rounded-xl flex items-center justify-center text-slate-400 hover:text-emerald-400 transition-all hover:scale-105 group" title="PCR By Strike">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                        </a>
                        <a href="/straddle" className="w-10 h-10 bg-slate-800/50 hover:bg-emerald-500/20 rounded-xl flex items-center justify-center text-slate-400 hover:text-emerald-400 transition-all hover:scale-105 group" title="ATM Straddle Analysis">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"></path><path d="m19 9-5 5-4-4-3 3"></path></svg>
                        </a>
                        <a href="/option-chain" className="w-10 h-10 bg-slate-800/50 hover:bg-emerald-500/20 rounded-xl flex items-center justify-center text-slate-400 hover:text-emerald-400 transition-all hover:scale-105 group" title="Option Chain">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                        </a>
                        <a href="/cumulative" className="w-10 h-10 bg-slate-800/50 hover:bg-emerald-500/20 rounded-xl flex items-center justify-center text-slate-400 hover:text-emerald-400 transition-all hover:scale-105 group" title="Cumulative OI Analysis">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 20V10"></path><path d="M12 20V4"></path><path d="M6 20v-6"></path></svg>
                        </a>
                        <a href="/strike" className="w-10 h-10 bg-slate-800/50 hover:bg-emerald-500/20 rounded-xl flex items-center justify-center text-slate-400 hover:text-emerald-400 transition-all hover:scale-105 group" title="Strike Analytics">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2m0 0h2" /></svg>
                        </a>
                        <a href="/greeks" className="w-10 h-10 bg-slate-800/50 hover:bg-emerald-500/20 rounded-xl flex items-center justify-center text-slate-400 hover:text-emerald-400 transition-all hover:scale-105 group" title="Greeks Exposure">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                        </a>
                        <a href="/max-pain" className="w-10 h-10 bg-slate-800/50 hover:bg-emerald-500/20 rounded-xl flex items-center justify-center text-slate-400 hover:text-emerald-400 transition-all hover:scale-105 group" title="Max Pain & IV Smile">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                        </a>
                        <a href="/multi-strike" className="w-10 h-10 bg-slate-800/50 hover:bg-emerald-500/20 rounded-xl flex items-center justify-center text-slate-400 hover:text-emerald-400 transition-all hover:scale-105 group" title="Multi-Strike Analysis">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3h18v18H3zM9 3v18M15 3v18M3 9h18M3 15h18"></path></svg>
                        </a>
                        <a href="/strategies" className="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-transform hover:scale-105" title="Strategy Command Center">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
                        </a>
                    </nav>

                    <main className="pl-24 pr-8 py-8 max-w-[1400px] mx-auto">
                        {/* Header */}
                        <div className="flex justify-between items-end mb-12">
                            <div>
                                <h1 className="text-4xl font-black text-white tracking-tight flex items-center gap-3">
                                    COMMAND <span className="bg-emerald-500 text-white px-2 py-0.5 rounded text-xs font-black tracking-widest">CENTER</span>
                                </h1>
                                <p className="text-slate-500 text-xs font-bold uppercase tracking-[0.3em] mt-2 text-emerald-500/60">Live Strategy Management</p>
                            </div>
                            <div className="flex gap-4">
                                <div className="glass px-4 py-2 rounded-xl border-slate-800/50 flex items-center gap-3">
                                    <div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                                    <span className="text-[10px] font-black text-emerald-400 uppercase tracking-widest">System Online</span>
                                </div>
                            </div>
                        </div>

                        {/* Strategies Grid */}
                        <div className="grid grid-cols-1 gap-6">
                            {loading ? (
                                <div className="flex items-center justify-center py-20">
                                    <div className="text-emerald-400 text-sm font-black tracking-widest animate-pulse">SCANNING DIRECTORIES...</div>
                                </div>
                            ) : strategies.map(strategy => (
                                <div key={strategy.id} className="glass-strong p-6 rounded-[2rem] border-slate-800/80 shadow-[0_0_60px_rgba(0,0,0,0.4)] hover:border-slate-700/60 transition-all group">
                                    <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-8">
                                        <div className="flex-1">
                                            <div className="flex items-center gap-3 mb-2">
                                                <h2 className="text-2xl font-black text-white tracking-tight">{strategy.name}</h2>
                                                {strategy.is_running ? (
                                                    <span className="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2 py-0.5 rounded-full text-[10px] font-black tracking-widest flex items-center gap-1.5 status-pulse">
                                                        <div className="w-1 h-1 bg-emerald-400 rounded-full"></div> RUNNING
                                                    </span>
                                                ) : (
                                                    <span className="bg-slate-800/50 text-slate-500 border border-slate-700/50 px-2 py-0.5 rounded-full text-[10px] font-black tracking-widest">
                                                        STOPPED
                                                    </span>
                                                )}
                                            </div>
                                            <p className="text-slate-500 text-xs font-medium max-w-xl">{strategy.description}</p>
                                        </div>

                                        <div className="flex flex-wrap items-center gap-8">
                                            {/* Stats */}
                                            <div className="flex gap-8">
                                                <div>
                                                    <p className="text-[9px] font-black text-slate-600 uppercase tracking-widest mb-1 text-emerald-500/40">Real-Time PnL</p>
                                                    <p className={`text-xl font-black tracking-tighter ${strategy.pnl >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                                        &#8377;{strategy.pnl.toLocaleString('en-IN', { minimumFractionDigits: 2 })}
                                                    </p>
                                                </div>
                                                <div>
                                                    <p className="text-[9px] font-black text-slate-600 uppercase tracking-widest mb-1 text-emerald-500/40">Uptime</p>
                                                    <p className="text-xl font-black text-white tracking-tighter">
                                                        {strategy.uptime || '--:--:--'}
                                                    </p>
                                                </div>
                                            </div>

                                            {/* Actions */}
                                            <div className="flex items-center gap-3">
                                                <button
                                                    onClick={() => openConfig(strategy.id)}
                                                    className="w-12 h-12 glass rounded-2xl flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-800 transition-all"
                                                    title="Configure"
                                                >
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                                </button>

                                                {!strategy.is_running ? (
                                                    <button
                                                        onClick={() => handleStart(strategy.id)}
                                                        className="h-12 px-6 bg-emerald-500 hover:bg-emerald-400 text-white font-black text-xs tracking-widest rounded-2xl transition-all shadow-lg shadow-emerald-500/20 active:scale-95 flex items-center gap-2"
                                                    >
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>
                                                        START STRATEGY
                                                    </button>
                                                ) : (
                                                    <button
                                                        onClick={() => handleStop(strategy.id)}
                                                        className="h-12 px-6 bg-rose-500 hover:bg-rose-400 text-white font-black text-xs tracking-widest rounded-2xl transition-all shadow-lg shadow-rose-500/20 active:scale-95 flex items-center gap-2"
                                                    >
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"></path></svg>
                                                        STOP STRATEGY
                                                    </button>
                                                )}

                                                <button
                                                    onClick={() => toggleDetails(strategy.id)}
                                                    className={`w-12 h-12 glass rounded-2xl flex items-center justify-center text-slate-400 hover:text-white transition-all ${expandedStrategies[strategy.id] ? 'bg-slate-800 text-white rotate-180' : ''}`}
                                                    title="View Details"
                                                >
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Expanded Details Section */}
                                    {expandedStrategies[strategy.id] && (
                                        <div className="mt-6 pt-6 border-t border-slate-800/60 animate-in fade-in slide-in-from-top-4 duration-300">
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                {/* Status Summary */}
                                                <div className="bg-slate-900/40 rounded-xl p-4 border border-slate-800/50">
                                                    <h4 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Strategy State</h4>
                                                    <div className="space-y-2">
                                                        <div className="flex justify-between">
                                                            <span className="text-sm text-slate-400">Entry State</span>
                                                            <span className={`text-sm font-bold ${strategy.details?.entry_state === 'WAITING' ? 'text-amber-400' : 'text-emerald-400'}`}>
                                                                {strategy.details?.entry_state || 'UNKNOWN'}
                                                            </span>
                                                        </div>
                                                        <div className="flex justify-between">
                                                            <span className="text-sm text-slate-400">Total Qty</span>
                                                            <span className="text-sm font-bold text-white">{strategy.details?.total_qty || 0}</span>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* Positions Table */}
                                                <div className="md:col-span-2 bg-slate-900/40 rounded-xl p-4 border border-slate-800/50 flex flex-col gap-4">
                                                    <div>
                                                        <h4 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Active Positions</h4>
                                                        {!strategy.details?.positions || Object.keys(strategy.details.positions).length === 0 ? (
                                                            <div className="text-slate-600 text-sm italic py-2 text-center">No active positions</div>
                                                        ) : (
                                                            <div className="overflow-x-auto">
                                                                <table className="w-full text-sm text-left">
                                                                    <thead className="text-[10px] text-slate-500 uppercase bg-slate-800/30">
                                                                        <tr>
                                                                            <th className="px-3 py-2 rounded-l-lg">Instrument</th>
                                                                            <th className="px-3 py-2 text-right">Qty</th>
                                                                            <th className="px-3 py-2 text-right rounded-r-lg">LTP</th>
                                                                        </tr>
                                                                    </thead>
                                                                    <tbody>
                                                                        {Object.entries(strategy.details.positions).map(([symbol, val]) => {
                                                                            const qty = typeof val === 'object' ? val.qty : val;
                                                                            const ltp = typeof val === 'object' && val.ltp ? val.ltp : '--';
                                                                            return (
                                                                                <tr key={symbol} className="border-b border-slate-800/30 last:border-0 hover:bg-slate-800/20">
                                                                                    <td className="px-3 py-2 font-medium text-slate-300">{symbol}</td>
                                                                                    <td className={`px-3 py-2 text-right font-bold ${qty > 0 ? 'text-emerald-400' : 'text-rose-400'}`}>{qty}</td>
                                                                                    <td className="px-3 py-2 text-right text-slate-400">{ltp}</td>
                                                                                </tr>
                                                                            );
                                                                        })}
                                                                    </tbody>
                                                                </table>
                                                            </div>
                                                        )}
                                                    </div>

                                                    {/* Live Logs Terminal */}
                                                    <div className="flex-1 min-h-[200px] flex flex-col">
                                                        <h4 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 flex justify-between items-center">
                                                            <span>Live Execution Logs</span>
                                                            <span className="text-[9px] text-slate-600">Auto-refreshing (2s)</span>
                                                        </h4>
                                                        <div className="flex-1 bg-black/50 rounded-lg p-3 border border-slate-800 font-mono text-xs overflow-y-auto max-h-[300px] custom-scrollbar">
                                                            {logs[strategy.id] && logs[strategy.id].length > 0 ? (
                                                                logs[strategy.id].map((line, i) => (
                                                                    <div key={i} className="whitespace-pre-wrap text-slate-400 border-b border-slate-800/30 pb-0.5 mb-0.5 last:border-0">{line}</div>
                                                                ))
                                                            ) : (
                                                                <div className="text-slate-600 italic">Waiting for logs...</div>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>

                        {/* Config Modal */}
                        {configModal.show && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                                <div className="absolute inset-0 bg-[#030712]/80 backdrop-blur-sm" onClick={() => setConfigModal({ show: false, strategyId: null, config: {} })}></div>
                                <div className="glass-strong w-full max-w-2xl max-h-[90vh] overflow-hidden rounded-[2.5rem] shadow-2xl z-10 flex flex-col">
                                    <div className="p-8 border-b border-slate-800/60 flex justify-between items-center">
                                        <h3 className="text-2xl font-black text-white tracking-tighter uppercase flex items-center gap-3">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="text-emerald-500"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                            Configuration
                                        </h3>
                                        <button onClick={() => setConfigModal({ show: false, strategyId: null, config: {} })} className="text-slate-500 hover:text-white transition-colors">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                        </button>
                                    </div>
                                    <div className="p-8 overflow-y-auto custom-scrollbar flex-1">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {Object.keys(configModal.config).map(key => {
                                                const val = configModal.config[key];
                                                // Exclude internal paths or huge dicts if any
                                                if (key === 'state_file' || key === 'access_token') return null;

                                                return (
                                                    <div key={key} className="space-y-1.5">
                                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest pl-1">{key.replace(/_/g, ' ')}</label>
                                                        {typeof val === 'boolean' ? (
                                                            <div className="flex gap-2">
                                                                <button
                                                                    onClick={() => updateConfigField(key, true)}
                                                                    className={`flex-1 py-2 rounded-xl text-[10px] font-black transition-all ${val === true ? 'bg-emerald-500 text-white' : 'bg-slate-800/50 text-slate-400'}`}
                                                                >TRUE</button>
                                                                <button
                                                                    onClick={() => updateConfigField(key, false)}
                                                                    className={`flex-1 py-2 rounded-xl text-[10px] font-black transition-all ${val === false ? 'bg-rose-500 text-white' : 'bg-slate-800/50 text-slate-400'}`}
                                                                >FALSE</button>
                                                            </div>
                                                        ) : (
                                                            <input
                                                                type={typeof val === 'number' ? 'number' : 'text'}
                                                                value={val}
                                                                onChange={(e) => updateConfigField(key, typeof val === 'number' ? Number(e.target.value) : e.target.value)}
                                                                className="w-full bg-slate-900/40 border border-slate-800 focus:border-emerald-500/50 rounded-xl px-4 py-2.5 text-sm text-white font-semibold transition-all outline-none"
                                                            />
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    <div className="p-8 border-t border-slate-800/60 bg-slate-900/20 flex gap-4">
                                        <button
                                            onClick={() => setConfigModal({ show: false, strategyId: null, config: {} })}
                                            className="flex-1 h-14 glass text-slate-400 font-black text-xs tracking-widest rounded-2xl hover:text-white transition-all uppercase"
                                        >Cancel</button>
                                        <button
                                            onClick={saveConfig}
                                            disabled={savingConfig}
                                            className="flex-1 h-14 bg-emerald-500 hover:bg-emerald-400 disabled:bg-emerald-800 text-white font-black text-xs tracking-widest rounded-2xl transition-all shadow-lg shadow-emerald-500/20 uppercase"
                                        >
                                            {savingConfig ? 'Saving...' : 'Save Configuration'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<StrategyCommandCenter />);
    </script>
</body>

</html>
