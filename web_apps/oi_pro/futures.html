<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futures Analysis | OI Pro</title>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Recharts Dependencies -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        accent: {
                            DEFAULT: '#3b82f6',
                            muted: 'rgba(59, 130, 246, 0.1)'
                        },
                        bull: '#10b981',
                        bear: '#ef4444',
                        cover: '#3b82f6',
                        unwind: '#f59e0b',
                        background: 'var(--background)',
                        foreground: 'var(--foreground)',
                        card: 'var(--card)',
                        border: 'var(--border)',
                        muted: 'var(--muted)',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --background: #fdfdfd;
            --foreground: #020817;
            --card: #ffffff;
            --muted: #f1f5f9;
            --border: #e2e8f0;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --bull: #10b981;
            --bear: #ef4444;
        }

        .dark {
            --background: #030712;
            --foreground: #f8fafc;
            --card: #0f172a;
            --muted: #1e293b;
            --border: #1e293b;
            --accent: #60a5fa;
            --accent-glow: rgba(96, 165, 250, 0.3);
            --bull: #34d399;
            --bear: #fb7185;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: 'Inter', sans-serif;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(96, 165, 250, 0.05) 0%, transparent 40%);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }

        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-card-hover:hover {
            transform: translateY(-2px);
            background: rgba(59, 130, 246, 0.05);
            border-color: rgba(59, 130, 246, 0.2);
        }

        .neon-border {
            position: relative;
        }

        .neon-border::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0%;
            height: 2px;
            background: var(--accent);
            transition: all 0.3s ease;
            transform: translateX(-50%);
            box-shadow: 0 0 10px var(--accent);
        }

        .neon-border:hover::after {
            width: 80%;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.4);
        }

        @keyframes pulse-slow {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .animate-pulse-slow {
            animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>

<body class="bg-background text-foreground overflow-hidden">
    <div id="sidebar-root"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const {
            ResponsiveContainer, ComposedChart, LineChart, BarChart, ScatterChart,
            Line, Bar, Scatter, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
            Cell, ReferenceArea, ReferenceLine, Label
        } = Recharts;

        const BUILDUP_COLORS = {
            "Long Buildup": "#10b981",    // Emerald-500
            "Short Buildup": "#ef4444",   // Red-500
            "Short Covering": "#3b82f6",  // Blue-500
            "Long Unwinding": "#f59e0b",  // Amber-500
            "Neutral": "#94a3b8"          // Slate-400
        };

        const formatNumber = (num) => {
            if (num >= 10000000) return (num / 10000000).toFixed(2) + 'Cr';
            if (num >= 100000) return (num / 100000).toFixed(2) + 'L';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toFixed(0);
        };

        const Sparkline = ({ data, dataKey, color }) => (
            <div className="h-8 w-16 opacity-80">
                <ResponsiveContainer width="100%" height="100%">
                    <LineChart data={data}>
                        <Line
                            type="monotone"
                            dataKey={dataKey}
                            stroke={color}
                            strokeWidth={1.5}
                            dot={false}
                            isAnimationActive={false}
                        />
                    </LineChart>
                </ResponsiveContainer>
            </div>
        );

        const StatCard = ({ title, value, subValue, color, icon, trendData, trendKey }) => (
            <div className="glass-panel stat-card-hover rounded-2xl p-4 flex flex-col justify-between h-full group">
                <div className="flex justify-between items-start">
                    <div className="space-y-1">
                        <span className="text-[10px] font-bold uppercase tracking-widest text-muted-foreground/70">{title}</span>
                        <div className="text-2xl font-black tracking-tight leading-none group-hover:text-accent transition-colors">
                            {value}
                        </div>
                    </div>
                    <div className={`p-2 rounded-xl bg-muted/30 border border-border/10 group-hover:border-accent/20 transition-all`}>
                        <i data-lucide={icon} className={`w-4 h-4 ${color}`}></i>
                    </div>
                </div>
                <div className="flex items-center justify-between mt-4">
                    {subValue && (
                        <div className={`text-xs font-bold px-2 py-0.5 rounded-full ${subValue.startsWith('+') ? 'bg-emerald-500/10 text-emerald-500' : subValue.startsWith('-') ? 'bg-red-500/10 text-red-500' : 'bg-muted/50 text-muted-foreground'}`}>
                            {subValue}
                        </div>
                    )}
                    {trendData && trendData.length > 0 && (
                        <div className="h-10 w-24">
                            <ResponsiveContainer width="100%" height="100%">
                                <LineChart data={trendData}>
                                    <Line
                                        type="monotone"
                                        dataKey={trendKey}
                                        stroke={subValue?.startsWith('-') ? '#fb7185' : '#34d399'}
                                        strokeWidth={2}
                                        dot={false}
                                        isAnimationActive={true}
                                    />
                                </LineChart>
                            </ResponsiveContainer>
                        </div>
                    )}
                </div>
            </div>
        );

        const SentimentGauge = ({ signal }) => {
            const levels = ["Short Buildup", "Long Unwinding", "Neutral", "Short Covering", "Long Buildup"];
            const colors = ["#fb7185", "#fbbf24", "#94a3b8", "#60a5fa", "#34d399"];
            const index = levels.indexOf(signal);
            const activeColor = index !== -1 ? colors[index] : "#94a3b8";

            return (
                <div className="w-full h-full flex flex-col justify-center gap-3 p-2">
                    <div className="flex justify-between items-center text-[9px] font-black uppercase text-muted-foreground/60 tracking-widest">
                        <span>BEARISH</span>
                        <span>BULLISH</span>
                    </div>
                    <div className="relative h-2 w-full bg-muted/20 rounded-full overflow-hidden flex gap-0.5 p-0.5">
                        {colors.map((c, i) => (
                            <div
                                key={i}
                                className="flex-1 rounded-sm transition-all duration-700"
                                style={{
                                    backgroundColor: i === index ? c : 'transparent',
                                    opacity: i === index ? 1 : 0.05,
                                    boxShadow: i === index ? `0 0 15px ${c}` : 'none'
                                }}
                            />
                        ))}
                    </div>
                    <div className="flex items-center justify-center gap-2">
                        <div className="w-2 h-2 rounded-full animate-pulse" style={{ backgroundColor: activeColor }}></div>
                        <span className="font-black text-xs tracking-tighter uppercase" style={{ color: activeColor }}>
                            {signal?.toUpperCase() || 'ANALYZING...'}
                        </span>
                    </div>
                </div>
            );
        };

        function FuturesDashboard() {
            const [data, setData] = useState([]);
            const [symbols, setSymbols] = useState([]);
            const [selectedSymbol, setSelectedSymbol] = useState("ADANIPORTS");
            const [loading, setLoading] = useState(true);
            const [expiries, setExpiries] = useState([]);
            const [selectedExpiry, setSelectedExpiry] = useState("");
            const [activeTab, setActiveTab] = useState('price-oi');
            const [error, setError] = useState(null);

            useEffect(() => {
                const fetchSymbols = async () => {
                    try {
                        const res = await fetch('/api/futures/symbols');
                        const result = await res.json();
                        if (result.status === "success") setSymbols(result.data);
                    } catch (e) { console.error("Symbol fetch failed", e); }
                };
                fetchSymbols();
            }, []);

            useEffect(() => {
                const fetchExpiries = async () => {
                    try {
                        const res = await fetch(`/api/futures/expiries?symbol=${selectedSymbol}`);
                        const result = await res.json();
                        if (result.status === "success") {
                            setExpiries(result.data);
                            setSelectedExpiry(""); // Reset to Continuous on symbol change
                        }
                    } catch (e) { console.error("Expiry fetch failed", e); }
                };
                fetchExpiries();
            }, [selectedSymbol]);

            useEffect(() => {
                const fetchData = async () => {
                    setLoading(true);
                    try {
                        const token = localStorage.getItem("oi_pro_jwt") || localStorage.getItem("token");
                        const expiryParam = selectedExpiry ? `&expiry=${selectedExpiry}` : "";
                        const res = await fetch(`/api/futures/data?symbol=${selectedSymbol}${expiryParam}`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        const result = await res.json();
                        if (result.status === "success") {
                            setData(result.data);
                            setError(null);
                        } else {
                            setError(result.detail || "Failed to load data");
                        }
                    } catch (e) {
                        setError(e.message);
                    } finally {
                        setLoading(false);
                        setTimeout(() => lucide.createIcons(), 100);
                    }
                };
                fetchData();
            }, [selectedSymbol, selectedExpiry]);

            const latest = useMemo(() => data[data.length - 1] || {}, [data]);

            if (loading && data.length === 0) return (
                <div className="h-screen flex items-center justify-center pr-10 pl-28">
                    <div className="flex flex-col items-center gap-3">
                        <div className="w-10 h-10 border-4 border-accent border-t-transparent rounded-full animate-spin"></div>
                        <p className="font-bold text-xs text-muted-foreground animate-pulse uppercase tracking-tighter">Syncing Data...</p>
                    </div>
                </div>
            );

            return (
                <div className="h-screen bg-transparent p-2 pr-4 pl-[92px] flex flex-col gap-2">
                    {/* Header Row */}
                    <div className="flex justify-between items-center bg-card/60 backdrop-blur-2xl rounded-xl border border-border/40 p-2 px-5 shadow-lg relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-accent/30 to-transparent"></div>
                        <div className="flex items-center gap-6">
                            <div className="flex items-center gap-4 group cursor-default">
                                <div className="w-10 h-10 rounded-xl bg-accent/10 flex items-center justify-center border border-accent/20 group-hover:border-accent/40 transition-all duration-300 shadow-inner">
                                    <i data-lucide="zap" className="w-5 h-5 text-accent animate-pulse-slow"></i>
                                </div>
                                <div>
                                    <h1 className="text-lg font-black flex items-center gap-2 leading-none uppercase tracking-tighter">
                                        <span className="text-accent">FUTURES</span>
                                        <span className="text-foreground/90">HQ</span>
                                    </h1>
                                    <p className="text-[9px] text-muted-foreground font-bold mt-1.5 uppercase tracking-[0.2em] opacity-40">Predictive Intelligence Unit</p>
                                </div>
                            </div>

                            {/* Stock Selector */}
                            <div className="flex items-center gap-3 bg-muted/20 border border-border/20 rounded-xl px-4 py-2 focus-within:border-accent/40 focus-within:bg-muted/40 transition-all duration-300 group shadow-sm">
                                <div className="flex flex-col">
                                    <span className="text-[7px] font-black text-muted-foreground uppercase tracking-widest mb-0.5 opacity-60">Instrument</span>
                                    <div className="flex items-center gap-2">
                                        <i data-lucide="search" className="w-3.5 h-3.5 text-muted-foreground/60 group-focus-within:text-accent transition-colors"></i>
                                        <select
                                            value={selectedSymbol}
                                            onChange={(e) => setSelectedSymbol(e.target.value)}
                                            className="bg-transparent border-none outline-none text-[12px] font-black uppercase tracking-tight focus:ring-0 min-w-[120px] cursor-pointer text-foreground"
                                        >
                                            {symbols.map(s => <option key={s} value={s} className="bg-card text-foreground">{s}</option>)}
                                        </select>
                                    </div>
                                </div>
                            </div>

                            {/* Expiry Selector */}
                            {expiries.length > 0 && (
                                <div className="flex items-center gap-3 bg-muted/20 border border-border/20 rounded-xl px-4 py-2 focus-within:border-accent/40 focus-within:bg-muted/40 transition-all duration-300 group shadow-sm">
                                    <div className="flex flex-col">
                                        <span className="text-[7px] font-black text-muted-foreground uppercase tracking-widest mb-0.5 opacity-60">Cycle</span>
                                        <div className="flex items-center gap-2">
                                            <i data-lucide="clock" className="w-3.5 h-3.5 text-muted-foreground/60 group-focus-within:text-accent transition-colors"></i>
                                            <select
                                                value={selectedExpiry}
                                                onChange={(e) => setSelectedExpiry(e.target.value)}
                                                className="bg-transparent border-none outline-none text-[12px] font-black uppercase tracking-tight focus:ring-0 min-w-[130px] cursor-pointer text-foreground"
                                            >
                                                <option value="" className="bg-card text-foreground">CONTINUOUS</option>
                                                {expiries.map(e => (
                                                    <option key={e} value={e} className="bg-card text-foreground">
                                                        {new Date(e).toLocaleDateString('en-IN', { month: 'short', year: '2-digit' }).toUpperCase()} EXPIRY
                                                    </option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="flex items-center gap-1.5 bg-muted/40 border border-border/40 p-1 rounded-xl">
                            {['price-oi', 'oi-buildup', 'signals'].map(tab => (
                                <button
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all duration-300 ${activeTab === tab
                                        ? 'bg-accent text-white shadow-lg active-tab-glow'
                                        : 'hover:bg-muted/60 text-muted-foreground hover:text-foreground'
                                        }`}
                                >
                                    {tab.split('-').join(' ')}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Stats Row */}
                    <div className="grid grid-cols-5 gap-2">
                        <StatCard
                            title="LTP"
                            value={`₹${latest.close?.toLocaleString('en-IN')}`}
                            subValue={`${latest.price_change_pct > 0 ? '+' : ''}${latest.price_change_pct?.toFixed(2)}%`}
                            color="text-amber-500"
                            icon="trending-up"
                            trendData={data.slice(-7)}
                            trendKey="close"
                        />
                        <StatCard
                            title="OPEN INTEREST"
                            value={formatNumber(latest.oi || 0)}
                            subValue={`${latest.oi_change > 0 ? '+' : ''}${formatNumber(latest.oi_change || 0)}`}
                            color="text-blue-500"
                            icon="bar-chart-3"
                            trendData={data.slice(-7)}
                            trendKey="oi"
                        />
                        <StatCard
                            title="VOLUME"
                            value={formatNumber(latest.volume || 0)}
                            color="text-emerald-400"
                            icon="activity"
                            trendData={data.slice(-7)}
                            trendKey="volume"
                        />
                        <StatCard
                            title="VWAP"
                            value={`₹${latest.vwap?.toLocaleString('en-IN') || '---'}`}
                            subValue={latest.vwap_diff ? `${latest.vwap_diff > 0 ? '+' : ''}${latest.vwap_diff.toFixed(1)}` : null}
                            color="text-purple-500"
                            icon="navigation"
                            trendData={data.slice(-7)}
                            trendKey="vwap"
                        />
                        <div className="glass rounded-xl border border-border/40 p-2 h-full flex flex-col justify-center items-center shadow-sm hover:shadow-md transition-all duration-300">
                            <SentimentGauge signal={latest.signal} />
                        </div>
                    </div>

                    {/* Main Workspace */}
                    <div className="flex-1 bg-card/60 backdrop-blur-sm border border-border/30 rounded-xl p-4 shadow-xl relative overflow-hidden flex flex-col">
                        <div className="absolute top-0 left-0 w-0.5 h-full bg-accent/40"></div>

                        {error && (
                            <div className="absolute inset-0 z-10 bg-background/80 backdrop-blur-md flex items-center justify-center">
                                <div className="text-center p-6 border border-red-500/20 bg-red-500/5 rounded-3xl">
                                    <i data-lucide="alert-triangle" className="w-8 h-8 text-red-500 mx-auto mb-2"></i>
                                    <p className="text-sm font-bold text-red-500">{error}</p>
                                    <button onClick={() => setSelectedSymbol("ADANIPORTS")} className="mt-4 text-[10px] font-black uppercase text-accent underline">Reset to Default</button>
                                </div>
                            </div>
                        )}

                        <div className="flex-1 min-h-0">
                            {activeTab === 'price-oi' && (
                                <ResponsiveContainer width="100%" height="100%">
                                    <ComposedChart data={data}>
                                        <defs>
                                            <linearGradient id="colorOi" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#3b82f6" stopOpacity={0.4} />
                                                <stop offset="95%" stopColor="#3b82f6" stopOpacity={0.05} />
                                            </linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.08)" vertical={false} />
                                        <XAxis
                                            dataKey="timestamp"
                                            tickFormatter={(ts) => new Date(ts).toLocaleDateString('en-IN', { day: '2-digit', month: 'short' })}
                                            tick={{ fill: 'var(--muted-foreground)', fontSize: 10, fontWeight: 700 }}
                                            axisLine={false}
                                            tickLine={false}
                                            minTickGap={40}
                                        />
                                        <YAxis
                                            yAxisId="left"
                                            orientation="left"
                                            domain={['auto', 'auto']}
                                            tick={{ fill: '#f59e0b', fontSize: 10, fontWeight: 800 }}
                                            axisLine={false}
                                            tickLine={false}
                                            tickFormatter={(val) => `₹${val.toLocaleString()}`}
                                        />
                                        <YAxis
                                            yAxisId="right"
                                            orientation="right"
                                            tick={{ fill: '#3b82f6', fontSize: 10, fontWeight: 800 }}
                                            axisLine={false}
                                            tickLine={false}
                                            tickFormatter={(val) => formatNumber(val)}
                                        />
                                        <Tooltip
                                            content={({ active, payload, label }) => {
                                                if (active && payload && payload.length) {
                                                    return (
                                                        <div className="glass-panel p-4 rounded-2xl border border-white/10 shadow-2xl min-w-[200px] animate-in fade-in zoom-in duration-200">
                                                            <div className="flex items-center justify-between mb-3 border-b border-white/5 pb-2">
                                                                <span className="text-[10px] uppercase tracking-widest text-muted-foreground font-black">Timeline</span>
                                                                <span className="text-xs font-bold text-foreground">
                                                                    {new Date(label).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })}
                                                                </span>
                                                            </div>
                                                            <div className="space-y-2.5">
                                                                {payload.map((entry, index) => (
                                                                    <div key={index} className="flex items-center justify-between group">
                                                                        <div className="flex items-center gap-2">
                                                                            <div className="w-1.5 h-1.5 rounded-full" style={{ backgroundColor: entry.color || entry.stroke }}></div>
                                                                            <span className="text-[10px] font-bold text-muted-foreground/80 uppercase tracking-tight">{entry.name}</span>
                                                                        </div>
                                                                        <span className="text-xs font-black tracking-tight text-foreground">
                                                                            {['Price', 'High', 'Low', 'VWAP', 'Underlying'].includes(entry.name)
                                                                                ? `₹${entry.value.toLocaleString('en-IN', { maximumFractionDigits: 1 })}`
                                                                                : formatNumber(entry.value)}
                                                                        </span>
                                                                    </div>
                                                                ))}
                                                                {payload[0]?.payload.signal && (
                                                                    <div className="pt-2 border-t border-white/5 mt-2 flex justify-between items-center">
                                                                        <span className="text-[10px] font-bold text-muted-foreground uppercase">Buildup</span>
                                                                        <span className="text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded-md"
                                                                            style={{ backgroundColor: (BUILDUP_COLORS[payload[0].payload.signal] || '#94a3b8') + '20', color: BUILDUP_COLORS[payload[0].payload.signal] }}>
                                                                            {payload[0].payload.signal}
                                                                        </span>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    );
                                                }
                                                return null;
                                            }}
                                        />
                                        <Bar yAxisId="right" dataKey="oi" name="OI" fill="#60a5fa" radius={[6, 6, 0, 0]} opacity={0.15} />
                                        <Line yAxisId="left" type="monotone" dataKey="underlying_close" name="Underlying" stroke="#94a3b8" strokeWidth={1} strokeDasharray="6 6" dot={false} opacity={0.5} />
                                        <Line yAxisId="left" type="monotone" dataKey="vwap" name="VWAP" stroke="#a855f7" strokeWidth={2} strokeDasharray="3 3" dot={false} />
                                        <Line yAxisId="left" type="monotone" dataKey="close" name="Price" stroke="#3b82f6" strokeWidth={3} dot={false} animationDuration={1000} />
                                        <Line yAxisId="left" type="linear" dataKey="high" name="High" stroke="#fb7185" strokeWidth={1} dot={false} opacity={0.2} />
                                        <Line yAxisId="left" type="linear" dataKey="low" name="Low" stroke="#34d399" strokeWidth={1} dot={false} opacity={0.2} />
                                    </ComposedChart>
                                </ResponsiveContainer>
                            )}

                            {activeTab === 'oi-buildup' && (
                                <ResponsiveContainer width="100%" height="100%">
                                    <ComposedChart data={data}>
                                        <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.03)" vertical={false} />
                                        <XAxis
                                            dataKey="timestamp"
                                            tickFormatter={(ts) => new Date(ts).toLocaleDateString('en-IN', { day: '2-digit', month: 'short' })}
                                            tick={{ fill: 'var(--muted-foreground)', fontSize: 10, fontWeight: 700 }}
                                            axisLine={false}
                                            tickLine={false}
                                            minTickGap={40}
                                        />
                                        <YAxis
                                            yAxisId="left"
                                            tick={{ fill: 'var(--foreground)', fontSize: 9, fontWeight: 800 }}
                                            axisLine={false}
                                            tickLine={false}
                                            tickFormatter={(val) => formatNumber(val)}
                                        />
                                        <YAxis
                                            yAxisId="right"
                                            orientation="right"
                                            tick={{ fill: '#8b5cf6', fontSize: 9, fontWeight: 800 }}
                                            axisLine={false}
                                            tickLine={false}
                                            tickFormatter={(val) => formatNumber(val)}
                                        />
                                        <YAxis
                                            yAxisId="yPrice"
                                            orientation="right"
                                            domain={['dataMin - 100', 'dataMax + 100']}
                                            tick={{ fill: 'rgba(255,255,255,0.4)', fontSize: 8, fontWeight: 600 }}
                                            axisLine={false}
                                            tickLine={false}
                                            tickFormatter={(val) => `₹${Math.round(val)}`}
                                        />
                                        <Tooltip
                                            content={({ active, payload, label }) => {
                                                if (active && payload && payload.length) {
                                                    const oiChange = payload.find(p => p.dataKey === 'oi_change');
                                                    const signal = oiChange?.payload.signal;
                                                    return (
                                                        <div className="glass-panel p-4 rounded-2xl border border-white/10 shadow-2xl min-w-[200px] animate-in fade-in zoom-in duration-200">
                                                            <div className="flex items-center justify-between mb-3 border-b border-white/5 pb-2">
                                                                <span className="text-[10px] uppercase tracking-widest text-muted-foreground font-black">Timeline</span>
                                                                <span className="text-xs font-bold text-foreground">
                                                                    {new Date(label).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })}
                                                                </span>
                                                            </div>
                                                            <div className="space-y-2.5">
                                                                <div className="flex items-center justify-between">
                                                                    <div className="flex items-center gap-2">
                                                                        <div className="w-1.5 h-1.5 rounded-full" style={{ backgroundColor: BUILDUP_COLORS[signal] || '#3b82f6' }}></div>
                                                                        <span className="text-[10px] font-bold text-muted-foreground/80 uppercase tracking-tight">OI Δ</span>
                                                                    </div>
                                                                    <span className="text-xs font-black tracking-tight text-foreground">{formatNumber(oiChange?.value)}</span>
                                                                </div>
                                                                <div className="flex items-center justify-between">
                                                                    <div className="flex items-center gap-2">
                                                                        <div className="w-1.5 h-1.5 rounded-full bg-purple-500"></div>
                                                                        <span className="text-[10px] font-bold text-muted-foreground/80 uppercase tracking-tight">Volume</span>
                                                                    </div>
                                                                    <span className="text-xs font-black tracking-tight text-foreground">{formatNumber(payload.find(p => p.dataKey === 'volume')?.value)}</span>
                                                                </div>
                                                                <div className="flex items-center justify-between">
                                                                    <div className="flex items-center gap-2">
                                                                        <div className="w-1.5 h-1.5 rounded-full bg-slate-500"></div>
                                                                        <span className="text-[10px] font-bold text-muted-foreground/80 uppercase tracking-tight">Underlying</span>
                                                                    </div>
                                                                    <span className="text-xs font-black tracking-tight text-foreground">₹{payload.find(p => p.dataKey === 'underlying_close')?.value?.toLocaleString('en-IN')}</span>
                                                                </div>
                                                                {signal && (
                                                                    <div className="pt-2 border-t border-white/5 mt-2 flex justify-between items-center">
                                                                        <span className="text-[10px] font-bold text-muted-foreground uppercase">Signal</span>
                                                                        <span className="text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded-md"
                                                                            style={{ backgroundColor: (BUILDUP_COLORS[signal] || '#94a3b8') + '20', color: BUILDUP_COLORS[signal] }}>
                                                                            {signal}
                                                                        </span>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    );
                                                }
                                                return null;
                                            }}
                                        />
                                        <Bar yAxisId="left" dataKey="oi_change" name="OI Δ">
                                            {data.map((entry, index) => (
                                                <Cell key={`cell-${index}`} fill={BUILDUP_COLORS[entry.signal]} radius={entry.oi_change > 0 ? [3, 3, 0, 0] : [0, 0, 3, 3]} />
                                            ))}
                                        </Bar>
                                        <Line yAxisId="yPrice" type="monotone" dataKey="underlying_close" name="Underlying" stroke="rgba(255,255,255,0.4)" strokeWidth={1.5} strokeDasharray="4 4" dot={false} />
                                        <Line yAxisId="right" type="monotone" dataKey="volume" name="Volume" stroke="#8b5cf6" strokeWidth={2} dot={false} />
                                    </ComposedChart>
                                </ResponsiveContainer>
                            )}

                            {activeTab === 'signals' && (
                                <div className="grid grid-cols-1 lg:grid-cols-4 h-full gap-6">
                                    <div className="lg:col-span-3">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <ScatterChart margin={{ top: 10, right: 30, bottom: 10, left: 10 }}>
                                                <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.08)" />
                                                <XAxis
                                                    type="number"
                                                    dataKey="oi_change"
                                                    name="OI Change"
                                                    domain={['auto', 'auto']}
                                                    tick={{ fill: 'var(--muted-foreground)', fontSize: 8 }}
                                                    tickFormatter={formatNumber}
                                                >
                                                    <Label value="OI DELTA" offset={0} position="insideBottom" style={{ fill: 'var(--muted-foreground)', fontWeight: 900, fontSize: 9 }} />
                                                </XAxis>
                                                <YAxis
                                                    type="number"
                                                    dataKey="price_change"
                                                    name="Price Change"
                                                    domain={['auto', 'auto']}
                                                    tick={{ fill: 'var(--muted-foreground)', fontSize: 8 }}
                                                >
                                                    <Label value="PRICE DELTA" angle={-90} position="insideLeft" style={{ fill: 'var(--muted-foreground)', fontWeight: 900, fontSize: 9 }} />
                                                </YAxis>
                                                <Tooltip
                                                    cursor={{ strokeDasharray: '4 4', stroke: 'rgba(255,255,255,0.2)' }}
                                                    content={({ active, payload }) => {
                                                        if (active && payload && payload.length) {
                                                            const d = payload[0].payload;
                                                            return (
                                                                <div className="glass-panel p-4 rounded-2xl border border-white/10 shadow-2xl min-w-[180px] animate-in fade-in zoom-in duration-200">
                                                                    <div className="flex items-center justify-between mb-3 border-b border-white/5 pb-2">
                                                                        <span className="text-[10px] uppercase tracking-widest text-muted-foreground font-black">Timeline</span>
                                                                        <span className="text-xs font-bold text-foreground">
                                                                            {new Date(d.timestamp).toLocaleDateString('en-IN', { day: '2-digit', month: 'short' })}
                                                                        </span>
                                                                    </div>
                                                                    <div className="space-y-2.5">
                                                                        <div className="flex items-center justify-between">
                                                                            <span className="text-[10px] font-bold text-muted-foreground/80 uppercase">Price Change</span>
                                                                            <span className={`text-xs font-black ${d.price_change >= 0 ? 'text-emerald-500' : 'text-red-500'}`}>
                                                                                ₹{d.price_change?.toFixed(1)}
                                                                            </span>
                                                                        </div>
                                                                        <div className="flex items-center justify-between">
                                                                            <span className="text-[10px] font-bold text-muted-foreground/80 uppercase">OI Delta</span>
                                                                            <span className="text-xs font-black text-blue-400">{formatNumber(d.oi_change)}</span>
                                                                        </div>
                                                                        <div className="pt-2 border-t border-white/5 mt-2 flex justify-between items-center">
                                                                            <span className="text-[10px] font-bold text-muted-foreground uppercase">Signal</span>
                                                                            <span className="text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded-md"
                                                                                style={{ backgroundColor: BUILDUP_COLORS[d.signal] + '20', color: BUILDUP_COLORS[d.signal] }}>
                                                                                {d.signal}
                                                                            </span>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            );
                                                        }
                                                        return null;
                                                    }}
                                                />
                                                <ReferenceLine x={0} stroke="rgba(255,255,255,0.1)" strokeWidth={1} />
                                                <ReferenceLine y={0} stroke="rgba(255,255,255,0.1)" strokeWidth={1} />

                                                <ReferenceArea x1={0} y1={0} x2={Infinity} y2={Infinity} fill="#10b981" fillOpacity={0.02} />
                                                <ReferenceArea x1={0} y1={-Infinity} x2={Infinity} y2={0} fill="#ef4444" fillOpacity={0.02} />
                                                <ReferenceArea x1={-Infinity} y1={0} x2={0} y2={Infinity} fill="#3b82f6" fillOpacity={0.02} />
                                                <ReferenceArea x1={-Infinity} y1={-Infinity} x2={0} y2={0} fill="#f59e0b" fillOpacity={0.02} />

                                                <Scatter name="Signals" data={data}>
                                                    {data.map((entry, index) => (
                                                        <Cell key={`cell-${index}`} fill={BUILDUP_COLORS[entry.signal]} strokeWidth={1} stroke="rgba(0,0,0,0.3)" />
                                                    ))}
                                                </Scatter>
                                            </ScatterChart>
                                        </ResponsiveContainer>
                                    </div>
                                    <div className="overflow-auto bg-background/20 rounded-xl p-3 border border-border/20">
                                        <h3 className="text-[10px] font-black uppercase tracking-wider text-muted-foreground mb-3 sticky top-0 bg-transparent py-1">Recent Activity</h3>
                                        <table className="w-full text-left">
                                            <tbody className="text-[10px] font-bold divide-y divide-border/10">
                                                {[...data].reverse().slice(0, 15).map((row, i) => (
                                                    <tr key={i} className="hover:bg-accent/5 transition-colors">
                                                        <td className="py-2 opacity-60 text-[9px]">{new Date(row.timestamp).toLocaleDateString('en-IN', { day: '2-digit', month: 'short' })}</td>
                                                        <td className="py-2">₹{row.close.toFixed(0)}</td>
                                                        <td className="py-2 text-right">
                                                            <span className="px-1.5 py-0.5 rounded text-[8px] font-black uppercase whitespace-nowrap"
                                                                style={{ backgroundColor: BUILDUP_COLORS[row.signal] + '20', color: BUILDUP_COLORS[row.signal] }}>
                                                                {row.signal.split(' ')[0]}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FuturesDashboard />);
    </script>
    <script src="/sidebar.js"></script>
</body>

</html>
