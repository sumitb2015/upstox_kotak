<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Dashboard - OI Pro</title>
    <!-- Tailwind CSS (v3 standalone) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Enable manual dark mode toggle
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        // Semantic UI mapping to CSS Variables
                        background: 'var(--background)',
                        foreground: 'var(--foreground)',
                        card: 'var(--card)',
                        'card-foreground': 'var(--card-foreground)',
                        popover: 'var(--popover)',
                        'popover-foreground': 'var(--popover-foreground)',
                        primary: 'var(--primary)',
                        'primary-foreground': 'var(--primary-foreground)',
                        secondary: 'var(--secondary)',
                        'secondary-foreground': 'var(--secondary-foreground)',
                        muted: 'var(--muted)',
                        'muted-foreground': 'var(--muted-foreground)',
                        accent: 'var(--accent)',
                        'accent-foreground': 'var(--accent-foreground)',
                        destructive: 'var(--destructive)',
                        'destructive-foreground': 'var(--destructive-foreground)',
                        border: 'var(--border)',
                        input: 'var(--input)',
                        ring: 'var(--ring)',
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Light Mode Defaults (Root Variables) */
        :root {
            --background: #ffffff;
            --foreground: #09090b;

            --card: #ffffff;
            --card-foreground: #09090b;

            --popover: #ffffff;
            --popover-foreground: #09090b;

            --primary: #18181b;
            --primary-foreground: #fafafa;

            --secondary: #f4f4f5;
            --secondary-foreground: #18181b;

            --muted: #f4f4f5;
            --muted-foreground: #52525b;
            /* Darkened for better contrast */

            --accent: #f4f4f5;
            --accent-foreground: #18181b;

            --destructive: #ef4444;
            --destructive-foreground: #fafafa;

            --border: #e4e4e7;
            --input: #e4e4e7;
            --ring: #18181b;
        }

        /* Dark Mode Implementation */
        .dark {
            --background: #09090b;
            --foreground: #fafafa;

            --card: #09090b;
            --card-foreground: #fafafa;

            --popover: #09090b;
            --popover-foreground: #fafafa;

            --primary: #fafafa;
            --primary-foreground: #18181b;

            --secondary: #27272a;
            --secondary-foreground: #fafafa;

            --muted: #27272a;
            --muted-foreground: #a1a1aa;

            --accent: #27272a;
            --accent-foreground: #fafafa;

            --destructive: #7f1d1d;
            --destructive-foreground: #fafafa;

            --border: #27272a;
            --input: #27272a;
            --ring: #d4d4d8;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            min-height: 100vh;
            margin: 0;
            font-feature-settings: "rlig" 1, "calt" 1;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .main-content {
            margin-left: 5.5rem;
            padding: 1.5rem;
            min-height: 100vh;
            transition: margin-left 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                padding-bottom: 5rem;
            }
        }

        /* Shadcn Card borders */
        .shadcn-card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            color: var(--card-foreground);
        }

        .stock-card {
            transition: border-color 0.15s ease, background-color 0.15s ease;
        }

        /* Subtle hover instead of floating */
        .stock-card:hover {
            border-color: var(--accent);
            background-color: var(--accent);
        }

        /* Progress Bar Animation */
        .progress-bar {
            transition: width 0.5s ease-in-out;
        }
    </style>
</head>

<body class="antialiased selection:bg-secondary selection:text-foreground">

    <!-- Sidebar Integration -->
    <div id="sidebar-root"></div>
    <script src="/sidebar.js"></script>

    <div id="root" class="main-content"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const IconArrowUp = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="text-emerald-500">
                <path d="m5 12 7-7 7 7" />
                <path d="M12 19V5" />
            </svg>
        );

        const IconArrowDown = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="text-rose-500">
                <path d="M12 5v14" />
                <path d="m19 12-7 7-7-7" />
            </svg>
        );

        const IconMinus = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="text-zinc-500">
                <path d="M5 12h14" />
            </svg>
        );

        const StatBadge = ({ value, label, colorClass }) => (
            <div className="flex flex-col items-start gap-0.5">
                <span className="text-[11px] uppercase tracking-wider text-muted-foreground font-semibold flex items-center gap-1.5">
                    <span className={`w-2 h-2 rounded-full ${label === 'Advances' ? 'bg-emerald-500' : 'bg-rose-500'}`}></span>
                    {label}
                </span>
                <span className={`text-2xl font-bold tracking-tight ${colorClass}`}>{value}</span>
            </div>
        );

        const AdvanceDeclineCard = ({ advances, declines, activeIndex }) => {
            const total = advances + declines;
            const advancePct = total > 0 ? (advances / total) * 100 : 50;
            const declinePct = total > 0 ? (declines / total) * 100 : 50;

            const indexName = activeIndex === 'BANKNIFTY' ? 'Bank Nifty' : 'Nifty 50';

            return (
                <div className="shadcn-card p-5 mb-6 max-w-xl">
                    <div className="flex items-center justify-between mb-5">
                        <div className="space-y-1">
                            <h2 className="text-sm border-l-2 border-zinc-700 pl-2 font-medium leading-none text-foreground tracking-tight">Market Breadth</h2>
                            <p className="text-[11px] pl-2.5 text-muted-foreground">{indexName} Constituents · Ratio {advances}:{declines}</p>
                        </div>
                        <div className="flex items-center gap-6">
                            <StatBadge value={advances} label="Advances" colorClass="text-emerald-500" />
                            <StatBadge value={declines} label="Declines" colorClass="text-rose-500" />
                        </div>
                    </div>

                    {/* Progress Bar Container */}
                    <div className="relative h-1.5 bg-secondary rounded-full overflow-hidden w-full">
                        <div
                            className="absolute top-0 left-0 h-full bg-emerald-500 progress-bar"
                            style={{ width: `${advancePct}%` }}
                        ></div>
                        <div
                            className="absolute top-0 right-0 h-full bg-rose-500 progress-bar"
                            style={{ width: `${declinePct}%` }}
                        ></div>
                    </div>
                </div>
            );
        };

        const StockCard = ({ symbol, data }) => {
            const { ltp, chg, prev } = data;
            const isPositive = chg > 0;
            const isNegative = chg < 0;

            let borderClass = "";
            let textClass = "text-muted-foreground";
            let IconBtn = IconMinus;
            let bgAccent = "bg-secondary/40 text-muted-foreground";
            let chgColor = "text-zinc-500";

            if (isPositive) {
                borderClass = "hover:border-emerald-500/50 hover:bg-emerald-500/5";
                textClass = "text-emerald-500";
                chgColor = "text-emerald-500";
                IconBtn = IconArrowUp;
                bgAccent = "bg-emerald-500/10 text-emerald-500";
            } else if (isNegative) {
                borderClass = "hover:border-rose-500/50 hover:bg-rose-500/5";
                textClass = "text-rose-500";
                chgColor = "text-rose-500";
                IconBtn = IconArrowDown;
                bgAccent = "bg-rose-500/10 text-rose-500";
            }

            return (
                <div className={`stock-card shadcn-card p-3 flex flex-col justify-between h-full ${borderClass}`}>
                    <div className="flex justify-between items-start mb-3">
                        <h3 className="font-semibold text-foreground tracking-tight text-[13px] truncate pr-2" title={symbol}>{symbol}</h3>
                        <div className={`p-1 rounded-sm ${bgAccent}`}>
                            <IconBtn />
                        </div>
                    </div>

                    <div className="mt-auto">
                        <div className="flex items-baseline overflow-hidden">
                            <span className="text-xl font-bold tracking-tight text-foreground truncate">
                                {ltp ? ltp.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '---'}
                            </span>
                        </div>

                        <div className={`flex items-center font-medium ${chgColor} text-[11px] mt-0.5 tracking-wide`}>
                            {chg > 0 ? '+' : ''}{chg ? chg.toFixed(2) : '0.00'}%
                        </div>
                    </div>
                </div>
            );
        };

        const Dashboard = () => {
            const [isDark, setIsDark] = useState(document.documentElement.classList.contains('dark'));
            useEffect(() => {
                const handleTheme = () => setIsDark(document.documentElement.classList.contains('dark'));
                window.addEventListener('themeToggled', handleTheme);
                return () => window.removeEventListener('themeToggled', handleTheme);
            }, []);
            const [stocks, setStocks] = useState({});
            const [isConnected, setIsConnected] = useState(false);
            const [activeIndex, setActiveIndex] = useState('NIFTY');

            useEffect(() => {
                // Clear out the stale stocks array immediately when switching tabs
                // to prevent old index data from flashing before the fetch resolves.
                setStocks({});
                setIsConnected(false);

                const fetchQuotes = async () => {
                    try {
                        const token = localStorage.getItem('token');
                        let url = `/api/market-quote?index=${activeIndex}`;
                        if (token) url += `&token=${token}`;

                        const response = await fetch(url);
                        const result = await response.json();

                        if (result.status === 'success' && result.type === 'stock_data') {
                            setStocks(prev => {
                                const next = { ...prev };
                                for (const [sym, data] of Object.entries(result.data)) {
                                    next[sym] = { ...next[sym], ...data };
                                }
                                return next;
                            });
                            setIsConnected(true);
                        } else {
                            setIsConnected(false);
                            console.error("API Error", result.message);
                        }
                    } catch (e) {
                        console.error("Fetch error", e);
                        setIsConnected(false);
                    }
                };

                // Initial fetch
                fetchQuotes();

                // Poll every 10 seconds
                const interval = setInterval(fetchQuotes, 10000);

                return () => clearInterval(interval);
            }, [activeIndex]);

            // Calculate breadths
            const { advances, declines, sortedStocks } = useMemo(() => {
                let a = 0; let d = 0;
                const entries = Object.entries(stocks);
                entries.forEach(([sym, data]) => {
                    if (data.chg > 0) a++;
                    else if (data.chg < 0) d++;
                });
                return {
                    advances: a,
                    declines: d,
                    sortedStocks: entries.sort((a, b) => b[1].chg - a[1].chg)
                };
            }, [stocks]);

            return (
                <div className="pb-12 max-w-[1400px]">
                    <header className="mb-6 flex items-center justify-between pb-3">
                        <div className="flex items-center gap-6">
                            <div className="space-y-1">
                                <h1 className="text-2xl font-bold tracking-tight text-foreground">
                                    Stock Components
                                </h1>
                                <p className="text-sm text-muted-foreground">Market Snapshot & Sector Breadth</p>
                            </div>

                            {/* Shadcn Segmented Control / Tabs */}
                            <div className="flex items-center p-1 bg-card border border-border rounded-lg">
                                <button
                                    onClick={() => setActiveIndex('NIFTY')}
                                    className={`px-4 py-1.5 text-sm font-medium rounded-md transition-all ${activeIndex === 'NIFTY' ? 'bg-secondary text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground hover:bg-secondary/50'}`}
                                >
                                    Nifty 50
                                </button>
                                <button
                                    onClick={() => setActiveIndex('BANKNIFTY')}
                                    className={`px-4 py-1.5 text-sm font-medium rounded-md transition-all ${activeIndex === 'BANKNIFTY' ? 'bg-secondary text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground hover:bg-secondary/50'}`}
                                >
                                    Bank Nifty
                                </button>
                            </div>
                        </div>

                        <div className="flex items-center gap-2 text-[11px] font-medium bg-card border border-border px-3 py-1.5 rounded-md shadow-sm">
                            <div className={`w-2 h-2 rounded-full ${isConnected ? 'bg-emerald-500 animate-pulse' : 'bg-rose-500'}`}></div>
                            <span className={isConnected ? 'text-emerald-500 font-semibold' : 'text-rose-500 font-semibold'}>
                                {isConnected ? 'LIVE' : 'DISCONNECTED'}
                            </span>
                        </div>
                    </header>

                    <AdvanceDeclineCard advances={advances} declines={declines} activeIndex={activeIndex} />

                    {sortedStocks.length === 0 ? (
                        <div className="flex flex-col items-center justify-center py-20 shadcn-card border border-dashed border-border">
                            <div className="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-zinc-500 mb-4"></div>
                            <span className="text-muted-foreground text-sm font-medium tracking-wide">Fetching Quotes...</span>
                        </div>
                    ) : (
                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-7 gap-3">
                            {sortedStocks.map(([symbol, data]) => (
                                <StockCard key={symbol} symbol={symbol} data={data} />
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>

</html>
