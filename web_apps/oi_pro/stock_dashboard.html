<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Dashboard - OI Pro</title>
    <!-- Tailwind CSS (v3 standalone) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Enable manual dark mode toggle
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        // Semantic UI mapping to CSS Variables
                        background: 'var(--background)',
                        foreground: 'var(--foreground)',
                        card: 'var(--card)',
                        'card-foreground': 'var(--card-foreground)',
                        popover: 'var(--popover)',
                        'popover-foreground': 'var(--popover-foreground)',
                        primary: 'var(--primary)',
                        'primary-foreground': 'var(--primary-foreground)',
                        secondary: 'var(--secondary)',
                        'secondary-foreground': 'var(--secondary-foreground)',
                        muted: 'var(--muted)',
                        'muted-foreground': 'var(--muted-foreground)',
                        accent: 'var(--accent)',
                        'accent-foreground': 'var(--accent-foreground)',
                        destructive: 'var(--destructive)',
                        'destructive-foreground': 'var(--destructive-foreground)',
                        border: 'var(--border)',
                        input: 'var(--input)',
                        ring: 'var(--ring)',
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

    <style>
        /* Modern Design System Tokens */
        :root {
            /* Light Mode - Airy & Clean */
            --bg-main: #f8faff;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #4f46e5 50%, #7c3aed 100%);
            --gainer-color: #16a34a;
            --gainer-bg: #f0fdf4;
            --loser-color: #dc2626;
            --loser-bg: #fff1f2;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --card-hover-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        .dark {
            /* Dark Mode - Deep Navy & Glassmorphism */
            --bg-main: #060910;
            --bg-card: #0d1421;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            --gainer-color: #00ff88;
            --gainer-bg: rgba(0, 255, 136, 0.08);
            --loser-color: #ff4466;
            --loser-bg: rgba(255, 68, 102, 0.08);
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            --card-hover-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s;
        }

        .main-content {
            margin-left: 5.5rem;
            padding: 2rem;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            box-shadow: var(--card-shadow);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s, border-color 0.3s;
        }

        .modern-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
        }

        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-hover-shadow);
        }

        .gainer-glow {
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
            border-color: rgba(0, 255, 136, 0.3) !important;
        }

        .loser-glow {
            box-shadow: 0 0 15px rgba(255, 68, 102, 0.1);
            border-color: rgba(255, 68, 102, 0.3) !important;
        }

        .dark .gainer-glow:hover {
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.2);
            border-color: var(--gainer-color) !important;
        }

        .dark .loser-glow:hover {
            box-shadow: 0 0 25px rgba(255, 68, 102, 0.2);
            border-color: var(--loser-color) !important;
        }

        /* Gradient Text & Underlines */
        .text-gradient {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .active-tab-indicator {
            height: 3px;
            background: var(--accent-gradient);
            border-radius: 100px;
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.4);
        }

        .pill-button {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pill-button.active {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* Pulse Live Indicator */
        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            position: relative;
        }

        .live-dot::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: inherit;
            border-radius: inherit;
            animation: pulse-ring 1.5s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.33);
                opacity: 1;
            }

            80%,
            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.3);
            border-radius: 10px;
        }
    </style>
</head>

<body class="antialiased selection:bg-secondary selection:text-foreground">

    <!-- Sidebar Integration -->
    <div id="sidebar-root"></div>
    <script src="/sidebar.js"></script>

    <div id="root" class="main-content"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const ThemeToggle = ({ isDark, toggle }) => (
            <button
                onClick={toggle}
                className="p-2 rounded-xl bg-card border border-border hover:border-indigo-500/50 transition-all active:scale-90"
            >
                {isDark ? (
                    <svg className="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z" />
                    </svg>
                ) : (
                    <svg className="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                )}
            </button>
        );

        const IconArrowUp = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18" />
            </svg>
        );

        const IconArrowDown = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
            </svg>
        );

        const IconMinus = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M20 12H4" />
            </svg>
        );

        const Header = ({ activeIndex, setActiveIndex, isConnected, isDark, toggleTheme }) => {
            const [time, setTime] = useState(new Date());
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            return (
                <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                    <div className="flex items-center gap-4">
                        <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-600 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                            <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                            </svg>
                        </div>
                        <div>
                            <h1 className="text-2xl font-black tracking-tight text-foreground">OI <span className="text-gradient">PRO</span></h1>
                            <div className="flex items-center gap-2 mt-0.5">
                                <div className="live-dot"></div>
                                <span className="text-[10px] font-bold tracking-widest uppercase opacity-60">
                                    {time.toLocaleTimeString('en-US', { hour12: false })} • {isConnected ? 'Live' : 'Offline'}
                                </span>
                            </div>
                        </div>
                    </div>

                    <div className="flex items-center gap-3 self-end md:self-auto">
                        <div className="flex p-1 bg-card/50 backdrop-blur-sm border border-border rounded-2xl">
                            <button
                                onClick={() => setActiveIndex('NIFTY')}
                                className={`pill-button px-5 py-2 text-xs font-bold rounded-xl ${activeIndex === 'NIFTY' ? 'active' : 'text-muted-foreground hover:text-foreground'}`}
                            >
                                NIFTY 50
                            </button>
                            <button
                                onClick={() => setActiveIndex('BANKNIFTY')}
                                className={`pill-button px-5 py-2 text-xs font-bold rounded-xl ${activeIndex === 'BANKNIFTY' ? 'active' : 'text-muted-foreground hover:text-foreground'}`}
                            >
                                BANK NIFTY
                            </button>
                        </div>
                        <ThemeToggle isDark={isDark} toggle={toggleTheme} />
                    </div>
                </header>
            );
        };

        const StockCard = ({ symbol, data }) => {
            const isGainer = data.chg > 0;
            const isLoser = data.chg < 0;
            const themeClass = isGainer ? 'border-emerald-500/30' : isLoser ? 'border-rose-500/30' : 'border-border/30';
            const glowClass = isGainer ? 'shadow-[0_0_15px_-5px_rgba(16,185,129,0.3)]' : isLoser ? 'shadow-[0_0_15px_-5px_rgba(239,68,68,0.3)]' : '';

            // Calculate chgp if missing
            const chgp = data.chgp !== undefined ? data.chgp : (data.chg && data.prev ? (data.chg / data.prev * 100) : 0);

            return (
                <div className={`glass-card p-2 group stock-card-hover ${themeClass} ${glowClass} relative overflow-hidden flex flex-col justify-between h-[85px]`}>
                    <div className="flex items-center justify-between mb-1">
                        <span className="text-[10px] font-black tracking-tighter text-muted-foreground uppercase truncate max-w-[70%]">{symbol}</span>
                        <div className={`p-0.5 rounded-sm ${isGainer ? 'text-emerald-500 bg-emerald-500/10' : isLoser ? 'text-rose-500 bg-rose-500/10' : 'text-muted-foreground'}`}>
                            {isGainer ? <IconArrowUp /> : isLoser ? <IconArrowDown /> : <IconMinus />}
                        </div>
                    </div>

                    <div className="space-y-0.5">
                        <div className="text-sm font-black tracking-tight text-foreground tabular-nums">
                            {new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 1 }).format(data.ltp)}
                        </div>
                        <div className={`text-[10px] font-bold flex items-center gap-1 ${isGainer ? 'text-emerald-500' : isLoser ? 'text-rose-500' : 'text-muted-foreground'}`}>
                            <span>{isGainer ? '+' : ''}{data.chg.toFixed(2)}</span>
                            <span className="opacity-70">({chgp.toFixed(2)}%)</span>
                        </div>
                    </div>
                </div>
            );
        };

        const AdvanceDeclineCard = ({ advances, declines, activeIndex }) => {
            const total = (advances + declines) || 1;
            const advPercent = (advances / total) * 100;

            return (
                <div className="glass-card p-3 mb-4 border-border/40 relative overflow-hidden group">
                    <div className="flex items-center justify-between mb-2">
                        <div className="space-y-0.5">
                            <span className="text-[9px] font-black uppercase tracking-widest text-muted-foreground">Market Breadth</span>
                            <div className="flex items-baseline gap-2">
                                <h3 className="text-xl font-black tracking-tighter text-foreground">{advances} / {total}</h3>
                                <span className="text-[9px] bg-indigo-500/10 text-indigo-500 px-1.5 py-0.5 rounded-sm font-bold">RATIO {advances}:{declines}</span>
                            </div>
                        </div>

                        <div className="flex gap-4">
                            <div className="text-right">
                                <span className="text-[9px] font-bold text-emerald-500 uppercase tracking-tight flex items-center gap-1 justify-end">
                                    <IconArrowUp /> Advances
                                </span>
                                <div className="text-sm font-black text-emerald-500">{advances}</div>
                            </div>
                            <div className="text-right">
                                <span className="text-[9px] font-bold text-rose-500 uppercase tracking-tight flex items-center gap-1 justify-end">
                                    <IconArrowDown /> Declines
                                </span>
                                <div className="text-sm font-black text-rose-500">{declines}</div>
                            </div>
                        </div>
                    </div>

                    <div className="h-1 w-full bg-rose-500/20 rounded-full overflow-hidden flex relative">
                        <div
                            className="h-full bg-gradient-to-r from-emerald-600 to-emerald-400 transition-all duration-1000 ease-out shadow-[0_0_8px_rgba(16,185,129,0.3)]"
                            style={{ width: `${advPercent}%` }}
                        />
                    </div>
                </div>
            );
        };


        // ── Analytics Tab: Long Buildup, Short Buildup, Short Covering, Long Unwinding ──
        const analyticsConfig = [
            { key: 'Long Buildup', label: 'Long Buildup', emoji: '🟢', colorClass: 'text-emerald-500', badgeClass: 'bg-emerald-500/10 text-emerald-500 border-emerald-500/20' },
            { key: 'Short Buildup', label: 'Short Buildup', emoji: '🔴', colorClass: 'text-rose-500', badgeClass: 'bg-rose-500/10 text-rose-500 border-rose-500/20' },
            { key: 'Short Covering', label: 'Short Covering', emoji: '🟡', colorClass: 'text-amber-500', badgeClass: 'bg-amber-500/10 text-amber-500 border-amber-500/20' },
            { key: 'Long Unwinding', label: 'Long Unwinding', emoji: '🟠', colorClass: 'text-orange-500', badgeClass: 'bg-orange-500/10 text-orange-500 border-orange-500/20' },
        ];

        const AnalyticsCard = ({ cfg, stocks }) => (
            <div className="shadcn-card p-4 flex flex-col gap-3">
                <div className="flex items-center gap-2 mb-1">
                    <span className="text-base">{cfg.emoji}</span>
                    <h3 className={`text-sm font-bold tracking-tight ${cfg.colorClass}`}>{cfg.label}</h3>
                    <span className="ml-auto text-[11px] px-2 py-0.5 rounded-full border font-semibold bg-secondary text-muted-foreground border-border">{stocks.length} stocks</span>
                </div>

                <div className="flex items-center gap-2 px-2 pb-1 border-b border-border/50 text-[10px] font-bold text-muted-foreground uppercase tracking-wider">
                    <span className="w-4">#</span>
                    <span className="flex-1">Symbol</span>
                    <span className="w-16 text-right">LTP</span>
                    <span className="w-12 text-right">Chg%</span>
                    <span className="w-16 text-right">OI Chg%</span>
                </div>

                {stocks.length === 0 ? (
                    <div className="text-xs text-muted-foreground py-8 text-center bg-muted/5 rounded-md border border-dashed border-border mt-2">
                        No stocks in this category
                    </div>
                ) : (
                    <div className="overflow-y-auto custom-scrollbar divide-y divide-border/50" style={{ maxHeight: '420px' }}>
                        {stocks.map((s, i) => (
                            <div key={s.symbol} className="flex items-center gap-2 px-2 py-2 hover:bg-muted/30 transition-colors group">
                                <span className="text-[10px] font-medium text-muted-foreground w-4 flex-shrink-0">{i + 1}</span>
                                <span className="text-[11px] font-bold text-foreground flex-1 truncate whitespace-nowrap" title={s.symbol}>
                                    {s.symbol}
                                </span>
                                <span className="text-[10px] font-semibold text-foreground w-16 text-right flex-shrink-0">
                                    {s.ltp?.toLocaleString('en-IN', { minimumFractionDigits: 1, maximumFractionDigits: 2 })}
                                </span>
                                <span className={`text-[10px] font-bold w-12 text-right flex-shrink-0 ${s.chg >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>
                                    {s.chg >= 0 ? '+' : ''}{s.chg_pct?.toFixed(1)}%
                                </span>
                                <span className={`text-[10px] font-bold w-16 text-right flex-shrink-0 px-1.5 py-0.5 rounded ${s.oi_chg_pct >= 0 ? 'bg-emerald-500/10 text-emerald-500' : 'bg-rose-500/10 text-rose-500'}`}>
                                    {s.oi_chg_pct >= 0 ? '+' : ''}{s.oi_chg_pct?.toFixed(1)}%
                                </span>
                            </div>
                        ))}
                    </div>
                )}
            </div>
        );

        const AnalyticsTab = ({ activeIndex }) => {
            const [analyticsData, setAnalyticsData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [lastUpdated, setLastUpdated] = useState(null);

            const fetchAnalytics = async () => {
                try {
                    const token = localStorage.getItem('oi_pro_jwt') || localStorage.getItem('token');
                    const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
                    const res = await fetch(`/api/stock-analytics?index=${activeIndex}`, { headers });
                    if (res.status === 401) return;
                    const result = await res.json();
                    if (result.status === 'success') {
                        setAnalyticsData(result.data);
                        setLastUpdated(new Date());
                    }
                } catch (e) {
                    console.error('[Analytics] Fetch error', e);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                setLoading(true);
                setAnalyticsData(null);
                fetchAnalytics();
                const interval = setInterval(fetchAnalytics, 60000); // refresh every minute
                return () => clearInterval(interval);
            }, [activeIndex]);

            if (loading && !analyticsData) return (
                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 mt-6">
                    {[1, 2, 3, 4].map(i => (
                        <div key={i} className="shadcn-card p-4 h-[450px] animate-pulse flex flex-col gap-4">
                            <div className="flex items-center gap-2 mb-2">
                                <div className="w-6 h-6 rounded-full bg-muted"></div>
                                <div className="w-24 h-4 rounded bg-muted"></div>
                                <div className="ml-auto w-12 h-4 rounded bg-muted"></div>
                            </div>
                            <div className="space-y-3">
                                {[1, 2, 3, 4, 5, 6].map(j => (
                                    <div key={j} className="flex gap-2">
                                        <div className="w-4 h-3 rounded bg-muted"></div>
                                        <div className="flex-1 h-3 rounded bg-muted"></div>
                                        <div className="w-12 h-3 rounded bg-muted"></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );

            return (
                <div className="mt-0">
                    <div className="flex items-center gap-2 mb-1 px-1">
                        <div className="ml-auto flex items-center gap-2">
                            {lastUpdated && <span className="text-[10px] font-medium text-muted-foreground bg-secondary px-2 py-0.5 rounded border border-border/50">Refreshed {lastUpdated.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })}</span>}
                            <button onClick={() => { setLoading(true); fetchAnalytics(); }} className="text-[10px] font-bold px-3 py-1 rounded bg-background border border-border text-foreground hover:bg-muted hover:border-indigo-500/50 transition-all active:scale-95 shadow-sm flex items-center gap-1.5">
                                <svg className={`w-3 h-3 ${loading ? 'animate-spin' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                </svg>
                                Refresh
                            </button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
                        {analyticsConfig.map(cfg => (
                            <AnalyticsCard key={cfg.key} cfg={cfg} stocks={analyticsData?.[cfg.key] || []} />
                        ))}
                    </div>

                    <div className="mt-6 shadcn-card overflow-hidden border-indigo-500/10">
                        <div className="bg-indigo-500/5 px-4 py-2 border-b border-indigo-500/10">
                            <h4 className="text-[10px] font-bold uppercase tracking-[0.1em] text-indigo-500/80">Market Sentiment Guide</h4>
                        </div>
                        <div className="p-4 bg-card">
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                {analyticsConfig.map(cfg => (
                                    <div key={cfg.key} className="flex gap-3 items-start group">
                                        <div className={`mt-1 p-2 rounded-lg ${cfg.badgeClass} flex-shrink-0 group-hover:scale-110 transition-transform`}>
                                            <span className="text-sm">{cfg.emoji}</span>
                                        </div>
                                        <div className="flex flex-col">
                                            <span className={`text-[12px] font-bold ${cfg.colorClass}`}>{cfg.label}</span>
                                            <span className="text-[10px] leading-relaxed text-muted-foreground mt-0.5">
                                                {cfg.key === 'Long Buildup' && 'Bullish: New long positions being institutionalized as prices rise with volume/OI.'}
                                                {cfg.key === 'Short Buildup' && 'Bearish: Aggressive selling seen as prices drop while OI increases.'}
                                                {cfg.key === 'Short Covering' && 'Bullish Reversal: Recent shorts are exiting to lock profits, pushing prices up.'}
                                                {cfg.key === 'Long Unwinding' && 'Bearish Consolidation: Longs are exiting positions, leading to a gentle price decline.'}
                                            </span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const BreadthChart = ({ history }) => {
            const chartRef = useRef(null);

            useEffect(() => {
                if (!chartRef.current || history.length === 0) return;

                const times = history.map(d => new Date(d.time));
                const advances = history.map(d => d.advances);
                const declines = history.map(d => d.declines);

                const traceAdv = {
                    x: times,
                    y: advances,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'Advances',
                    line: { color: '#10b981', width: 2, shape: 'spline' },
                    fill: 'tozeroy',
                    fillcolor: 'rgba(16, 185, 129, 0.1)'
                };

                const traceDec = {
                    x: times,
                    y: declines,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'Declines',
                    line: { color: '#f43f5e', width: 2, shape: 'spline' },
                    fill: 'tozeroy',
                    fillcolor: 'rgba(244, 63, 94, 0.1)'
                };

                const isDark = document.documentElement.classList.contains('dark');
                const textColor = isDark ? '#a1a1aa' : '#52525b';
                const gridColor = isDark ? '#27272a' : '#e4e4e7';
                const paperBg = 'transparent';
                const plotBg = 'transparent';

                // Calculate today's 9:15 AM and 3:30 PM
                const now = new Date();
                const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 9, 15, 0).getTime();
                const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 15, 30, 0).getTime();

                const layout = {
                    title: { text: '', font: { color: textColor } },
                    paper_bgcolor: paperBg,
                    plot_bgcolor: plotBg,
                    font: { family: 'Inter, sans-serif', color: textColor },
                    margin: { l: 40, r: 20, t: 20, b: 40 },
                    xaxis: {
                        showgrid: false,
                        type: 'date',
                        tickformat: '%H:%M',
                        range: [startOfDay, endOfDay]
                    },
                    yaxis: {
                        showgrid: true,
                        gridcolor: gridColor,
                        zeroline: false
                    },
                    legend: { orientation: 'h', y: 1.1, x: 0.5, xanchor: 'center' },
                    hovermode: 'x unified'
                };

                const config = { responsive: true, displayModeBar: false };

                Plotly.react(chartRef.current, [traceAdv, traceDec], layout, config);
            }, [history]);

            return (
                <div className="shadcn-card p-4 mt-6">
                    <div ref={chartRef} style={{ width: '100%', height: '400px' }}></div>
                    {history.length < 2 && (
                        <div className="text-center text-sm text-muted-foreground mt-2 pb-4">
                            Waiting for more data points to draw the chart (requires at least 1 minute).
                        </div>
                    )}
                </div>
            );
        };

        const Dashboard = () => {
            const [isDark, setIsDark] = useState(document.documentElement.classList.contains('dark'));
            const [stocks, setStocks] = useState({});
            const [isConnected, setIsConnected] = useState(false);
            const [activeIndex, setActiveIndex] = useState('NIFTY');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [history, setHistory] = useState({ NIFTY: [], BANKNIFTY: [] });

            const lastPushTimeRef = useRef({ NIFTY: 0, BANKNIFTY: 0 });

            const toggleTheme = () => {
                const isNowDark = !isDark;
                setIsDark(isNowDark);
                if (isNowDark) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
                window.dispatchEvent(new Event('themeToggled'));
            };

            useEffect(() => {
                const handleTheme = () => setIsDark(document.documentElement.classList.contains('dark'));
                window.addEventListener('themeToggled', handleTheme);
                return () => window.removeEventListener('themeToggled', handleTheme);
            }, []);

            useEffect(() => {
                setStocks({});
                setIsConnected(false);

                const fetchQuotes = async () => {
                    try {
                        const token = localStorage.getItem('oi_pro_jwt') || localStorage.getItem('token');
                        let url = `/api/market-quote?index=${activeIndex}`;
                        if (token) url += `&token=${token}`;

                        const response = await fetch(url);
                        const result = await response.json();

                        if (result.status === 'success' && result.type === 'stock_data') {
                            setStocks(prev => {
                                const next = { ...prev };
                                for (const [sym, data] of Object.entries(result.data)) {
                                    next[sym] = { ...next[sym], ...data };
                                }
                                return next;
                            });
                            setIsConnected(true);
                        } else {
                            setIsConnected(false);
                        }
                    } catch (e) {
                        setIsConnected(false);
                    }
                };

                let isMounted = true;
                const poll = async () => {
                    if (isMounted) await fetchQuotes();
                };

                poll();
                const interval = setInterval(poll, 10000);

                return () => {
                    isMounted = false;
                    clearInterval(interval);
                }
            }, [activeIndex]);

            const { advances, declines, sortedStocks } = useMemo(() => {
                let a = 0; let d = 0;
                const entries = Object.entries(stocks);
                entries.forEach(([sym, data]) => {
                    if (data.chg > 0) a++;
                    else if (data.chg < 0) d++;
                });
                return {
                    advances: a,
                    declines: d,
                    sortedStocks: entries.sort((a, b) => b[1].chg - a[1].chg)
                };
            }, [stocks]);

            useEffect(() => {
                const now = Date.now();
                const dateObj = new Date(now);
                const hours = dateObj.getHours();
                const mins = dateObj.getMinutes();
                const isMarketOpen = (hours > 9 || (hours === 9 && mins >= 15)) && (hours < 15 || (hours === 15 && mins <= 30));

                if ((advances + declines) > 0 && isConnected && isMarketOpen) {
                    const timeSinceLastPushed = now - lastPushTimeRef.current[activeIndex];
                    if (timeSinceLastPushed >= 60000) {
                        setHistory(prev => {
                            const newIndexHistory = [...prev[activeIndex], { time: now, advances, declines }];
                            if (newIndexHistory.length > 400) newIndexHistory.shift();
                            return { ...prev, [activeIndex]: newIndexHistory };
                        });
                        lastPushTimeRef.current[activeIndex] = now;
                    }
                }
            }, [advances, declines, activeIndex, isConnected]);

            return (
                <div className="pb-20 max-w-[1500px] mx-auto">
                    <Header
                        activeIndex={activeIndex}
                        setActiveIndex={setActiveIndex}
                        isConnected={isConnected}
                        isDark={isDark}
                        toggleTheme={toggleTheme}
                    />

                    {/* Modern Tab Navigation */}
                    <div className="mb-10 flex items-center justify-between border-b border-border/50 relative">
                        <div className="flex gap-8 relative">
                            {['dashboard', 'chart', 'analytics'].map(tab => (
                                <button
                                    key={tab}
                                    className={`relative pb-4 text-sm font-black uppercase tracking-widest transition-all ${activeTab === tab ? 'text-foreground' : 'text-muted-foreground hover:text-foreground'}`}
                                    onClick={() => setActiveTab(tab)}
                                >
                                    {tab}
                                    {activeTab === tab && (
                                        <div className="absolute bottom-0 left-0 right-0 active-tab-indicator -mb-[1px]"></div>
                                    )}
                                </button>
                            ))}
                        </div>
                    </div>

                    {activeTab === 'dashboard' && (
                        <div className="animate-in fade-in slide-in-from-bottom-4 duration-700">
                            <AdvanceDeclineCard advances={advances} declines={declines} activeIndex={activeIndex} />
                            {sortedStocks.length === 0 ? (
                                <div className="flex flex-col items-center justify-center py-32 glass-card">
                                    <div className="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-indigo-500 mb-6"></div>
                                    <span className="text-muted-foreground text-xs font-black uppercase tracking-[0.3em]">Synching Market Data...</span>
                                </div>
                            ) : (
                                <div className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-8 2xl:grid-cols-9 gap-3">
                                    {sortedStocks.map(([symbol, data]) => (
                                        <StockCard key={symbol} symbol={symbol} data={data} />
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {activeTab === 'chart' && (
                        <div className="animate-in fade-in slide-in-from-bottom-4 duration-700">
                            <BreadthChart history={history[activeIndex]} />
                        </div>
                    )}

                    {activeTab === 'analytics' && (
                        <div className="animate-in fade-in slide-in-from-bottom-4 duration-700">
                            <AnalyticsTab activeIndex={activeIndex} />
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>

</html>
