<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OI Pro — Broker Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            padding-left: 6rem;
        }

        .glass {
            background: var(--card);
            backdrop-filter: blur(32px);
            border: 1px solid var(--border);
        }

        .glass-input {
            background: var(--background);
            border: 1px solid var(--border);
            color: var(--foreground);
            outline: none;
            padding: 0.75rem 1rem;
            border-radius: 0.625rem;
        }

        .btn-cta {
            background: linear-gradient(135deg, #e11d48, #9f1239);
            /* Reddish like mockup */
            color: white;
            font-weight: 700;
            border-radius: 0.5rem;
            padding: 0.6rem 1.25rem;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(225, 29, 72, 0.2);
        }

        .btn-cta:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(225, 29, 72, 0.3);
            filter: brightness(1.1);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted-foreground);
            border-radius: 0.5rem;
            padding: 0.6rem 1.25rem;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            border-color: var(--foreground);
            color: var(--foreground);
            background: var(--muted);
        }

        .broker-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        .broker-table th {
            color: var(--muted-foreground);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 1.25rem 1rem;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }

        .broker-table td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }

        .broker-table tr:hover {
            background: var(--muted);
        }

        .status-pill {
            padding: 0.25rem 0.625rem;
            border-radius: 0.375rem;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-active {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        .status-expired {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
        }

        .notification {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: #f0fdf4;
            color: #166534;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            border-left: 4px solid #22c55e;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 3000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .breadcrumb {
            color: var(--muted-foreground);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }

        .breadcrumb span {
            color: var(--foreground);
            font-weight: 500;
        }
    </style>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        background: 'var(--background)',
                        foreground: 'var(--foreground)',
                        card: 'var(--card)',
                        'card-foreground': 'var(--card-foreground)',
                        popover: 'var(--popover)',
                        'popover-foreground': 'var(--popover-foreground)',
                        primary: 'var(--primary)',
                        'primary-foreground': 'var(--primary-foreground)',
                        secondary: 'var(--secondary)',
                        'secondary-foreground': 'var(--secondary-foreground)',
                        muted: 'var(--muted)',
                        'muted-foreground': 'var(--muted-foreground)',
                        accent: 'var(--accent)',
                        'accent-foreground': 'var(--accent-foreground)',
                        destructive: 'var(--destructive)',
                        'destructive-foreground': 'var(--destructive-foreground)',
                        border: 'var(--border)',
                        input: 'var(--input)',
                        ring: 'var(--ring)'
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --background: #ffffff;
            --foreground: #020817;
            --card: #ffffff;
            --card-foreground: #020817;
            --popover: #ffffff;
            --popover-foreground: #020817;
            --primary: #020817;
            --primary-foreground: #f8fafc;
            --secondary: #f8fafc;
            --secondary-foreground: #1e293b;
            --muted: #f1f5f9;
            --muted-foreground: #64748b;
            --accent: #f1f5f9;
            --accent-foreground: #020817;
            --destructive: #ef4444;
            --destructive-foreground: #f8fafc;
            --border: #e2e8f0;
            --input: #e2e8f0;
            --ring: #020817;
            --radius: 0.5rem;
        }

        .dark {
            --background: #020817;
            --foreground: #f8fafc;
            --card: #0f172a;
            --card-foreground: #f8fafc;
            --popover: #020817;
            --popover-foreground: #f8fafc;
            --primary: #f8fafc;
            --primary-foreground: #020817;
            --secondary: #1e293b;
            --secondary-foreground: #f8fafc;
            --muted: #1e293b;
            --muted-foreground: #94a3b8;
            --accent: #1e293b;
            --accent-foreground: #f8fafc;
            --destructive: #ef4444;
            --destructive-foreground: #f8fafc;
            --border: #334155;
            --input: #334155;
            --ring: #f8fafc;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .glass {
            background: var(--card);
            border: 1px solid var(--border);
        }
    </style>

</head>

<body class="p-8">
    <div id="sidebar-root"></div>

    <div id="success-notification" class="notification">
        <div class="flex items-center gap-3">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
            <div>
                <div class="font-bold">Successful</div>
                <div class="text-sm opacity-90">Broker detail saved successfully.</div>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto">
        <div class="breadcrumb">
            List | <span>Brokers</span>
        </div>

        <div class="glass rounded-2xl p-6 mb-8 flex flex-wrap items-end gap-6">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-xs font-bold text-muted-foreground uppercase mb-2">Select Broker</label>
                <select id="broker-select" class="glass-input w-full appearance-none">
                    <option value="Upstox">Upstox</option>
                    <option value="Kotak" disabled>Kotak (Coming Soon)</option>
                </select>
            </div>
            <div class="flex gap-3">
                <button onclick="openAddModal()" class="btn-cta">Add Broker</button>
                <button onclick="loadBrokers()" class="btn-outline">Refresh</button>
            </div>
        </div>

        <div class="glass rounded-2xl overflow-hidden">
            <table class="broker-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Broker</th>
                        <th>Name Tag</th>
                        <th>API Key</th>
                        <th>API Secret</th>
                        <th>Status</th>
                        <th>Last Token At</th>
                        <th>Generate Token</th>
                        <th>Action</th>
                        <th>Added At</th>
                    </tr>
                </thead>
                <tbody id="broker-list">
                    <!-- Brokers injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Broker Modal -->
    <div id="broker-modal" class="modal-overlay">
        <div class="modal-card">
            <h2 id="modal-title" class="text-2xl font-bold text-foreground mb-6">Add Broker Credentials</h2>
            <input type="hidden" id="modal-broker-id" value="">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-muted-foreground uppercase mb-2">Broker Name</label>
                    <input id="modal-broker-name" type="text" class="glass-input w-full opacity-60" value="Upstox"
                        readonly>
                </div>
                <div>
                    <label class="block text-xs font-bold text-muted-foreground uppercase mb-2">Name Tag (e.g. Primary
                        Account)</label>
                    <input id="modal-name-tag" type="text" class="glass-input w-full" placeholder="Main Upstox">
                </div>
                <div>
                    <label class="block text-xs font-bold text-muted-foreground uppercase mb-2">API Key</label>
                    <input id="modal-api-key" type="text" class="glass-input w-full" placeholder="Enter your API Key">
                </div>
                <div>
                    <label class="block text-xs font-bold text-muted-foreground uppercase mb-2">API Secret</label>
                    <input id="modal-api-secret" type="password" class="glass-input w-full"
                        placeholder="Enter your API Secret">
                </div>
                <div>
                    <label class="block text-xs font-bold text-muted-foreground uppercase mb-2">Redirect URI (must match
                        broker
                        portal)</label>
                    <input id="modal-redirect-uri" type="text" class="glass-input w-full"
                        placeholder="http://127.0.0.1:8001/api/brokers/callback/upstox">
                </div>
                <div class="flex gap-3 pt-6">
                    <button onclick="closeAddModal()" class="btn-outline flex-1">Cancel</button>
                    <button onclick="saveBroker()" class="btn-cta flex-1">Save Credentials</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-card" style="max-width: 400px; padding: 2rem; text-align: center;">
            <div class="mx-auto w-12 h-12 bg-rose-500/15 rounded-full flex items-center justify-center mb-4">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f43f5e" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h3 class="text-xl font-bold text-foreground mb-2">Delete Broker</h3>
            <p class="text-muted-foreground text-sm mb-6">Are you sure you want to remove this broker credential? This
                action
                cannot be undone.</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="btn-outline flex-1">Cancel</button>
                <button id="confirm-delete-btn" class="btn-cta flex-1"
                    style="background: linear-gradient(135deg, #e11d48, #9f1239);">Delete</button>
            </div>
        </div>
    </div>

    <script src="/sidebar.js"></script>
    <script>
        const jwt = localStorage.getItem('oi_pro_jwt');

        function showNotification() {
            const el = document.getElementById('success-notification');
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        let currentBrokers = [];

        async function loadBrokers() {
            try {
                const res = await window.fetchWithAuth('/api/brokers');
                if (!res.ok) throw new Error('Failed to fetch brokers');
                currentBrokers = await res.json();

                const container = document.getElementById('broker-list');
                if (currentBrokers.length === 0) {
                    container.innerHTML = `<tr><td colspan="10" class="text-center py-12 text-muted-foreground italic">No broker credentials found. Click "Add Broker" to get started.</td></tr>`;
                    return;
                }

                container.innerHTML = currentBrokers.map((b, idx) => `
                    <tr>
                        <td class="text-muted-foreground font-medium">${idx + 1}</td>
                        <td class="font-bold text-foreground">${b.broker_name}</td>
                        <td class="text-muted-foreground">${b.name_tag || '-'}</td>
                        <td class="font-mono text-zinc-500 text-xs">${b.api_key}</td>
                        <td class="font-mono text-zinc-500 text-xs">${b.api_secret}</td>
                        <td>
                            <span class="status-pill status-${b.status.toLowerCase()}">${b.status}</span>
                        </td>
                        <td class="text-muted-foreground text-xs">${b.last_token_at}</td>
                        <td>
                            ${b.token_exists
                        ? `<span class="text-emerald-400 font-bold text-xs flex items-center gap-1"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></svg> Token Generated</span>`
                        : `<button onclick="generateToken(${b.id})" class="text-rose-400 hover:text-rose-300 text-xs font-bold underline decoration-dotted underline-offset-4">
                                Click to Generate Token
                            </button>`
                    }
                        </td>
                        <td>
                            <div class="flex items-center gap-3">
                                ${b.token_exists
                        ? `<a href="/" class="px-3 py-1.5 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 rounded-md text-xs font-bold hover:bg-emerald-500/20 transition-colors flex items-center gap-1.5 shadow-[0_0_15px_rgba(16,185,129,0.15)]"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" y1="14" x2="21" y2="3" /></svg> Dashboard</a>`
                        : ''
                    }
                                <button onclick="openEditModal(${b.id})" class="text-muted-foreground hover:text-emerald-500 transition-colors" title="Edit Broker">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                </button>
                                <button onclick="confirmDeleteBroker(${b.id})" class="text-muted-foreground hover:text-rose-500 transition-colors" title="Delete Broker">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                </button>
                            </div>
                        </td>
                        <td class="text-muted-foreground text-xs">${b.created_at}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        function openAddModal() {
            document.getElementById('modal-title').innerText = 'Add Broker Credentials';
            document.getElementById('modal-broker-id').value = '';
            document.getElementById('modal-name-tag').value = '';
            document.getElementById('modal-api-key').value = '';
            document.getElementById('modal-api-secret').value = '';
            document.getElementById('modal-redirect-uri').value = 'http://127.0.0.1:8001/api/brokers/callback/upstox';
            document.getElementById('broker-modal').style.display = 'flex';
        }

        function openEditModal(id) {
            const b = currentBrokers.find(x => x.id === id);
            if (!b) return;
            document.getElementById('modal-title').innerText = 'Edit Broker Credentials';
            document.getElementById('modal-broker-id').value = b.id;
            document.getElementById('modal-name-tag').value = b.name_tag || '';
            document.getElementById('modal-api-key').value = b.api_key || '';
            document.getElementById('modal-api-secret').value = b.api_secret || '';
            document.getElementById('modal-redirect-uri').value = b.redirect_uri || 'http://127.0.0.1:8001/api/brokers/callback/upstox';
            document.getElementById('broker-modal').style.display = 'flex';
        }

        function closeAddModal() { document.getElementById('broker-modal').style.display = 'none'; }

        async function saveBroker() {
            const id = document.getElementById('modal-broker-id').value;
            const broker_name = document.getElementById('modal-broker-name').value;
            const name_tag = document.getElementById('modal-name-tag').value;
            const api_key = document.getElementById('modal-api-key').value;
            const api_secret = document.getElementById('modal-api-secret').value;
            const redirect_uri = document.getElementById('modal-redirect-uri').value;

            if (!id && (!api_key || !api_secret)) return alert('API Key and Secret are required for new brokers');

            try {
                const payload = { broker_name, name_tag, api_key, api_secret, redirect_uri };
                if (id) payload.id = id;

                const res = await window.fetchWithAuth('/api/brokers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error('Failed to save broker');

                closeAddModal();
                showNotification();
                loadBrokers();

            } catch (err) {
                alert(err.message);
            }
        }

        let brokerToDelete = null;

        function closeConfirmModal() {
            document.getElementById('confirm-modal').style.display = 'none';
            brokerToDelete = null;
        }

        function confirmDeleteBroker(id) {
            brokerToDelete = id;
            document.getElementById('confirm-modal').style.display = 'flex';
        }

        document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
            if (!brokerToDelete) return;
            const id = brokerToDelete;
            try {
                const res = await window.fetchWithAuth(`/api/brokers/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Failed to delete broker');
                closeConfirmModal();
                loadBrokers();
            } catch (err) {
                alert(err.message);
                closeConfirmModal();
            }
        });

        let authWindow = null;
        async function generateToken(id) {
            try {
                const res = await window.fetchWithAuth(`/api/brokers/generate-token/${id}`, { method: 'POST' });
                if (!res.ok) throw new Error('Failed to initiate login');

                const result = await res.json();
                if (result.auth_url) {
                    // Open Upstox authentication in a centered popup window
                    const width = 800;
                    const height = 750;
                    const left = (window.innerWidth / 2) - (width / 2);
                    const top = (window.innerHeight / 2) - (height / 2);
                    authWindow = window.open(result.auth_url, 'UpstoxAuth', `width=${width},height=${height},top=${top},left=${left}`);
                } else {
                    alert(result.message || 'Token generation triggered');
                }
            } catch (err) {
                alert('Token generation failed: ' + err.message);
            }
        }

        // Listen for success message from popup window
        window.addEventListener('message', (event) => {
            if (event.data === 'upstox_auth_success') {
                showNotification();
                loadBrokers();
            }
        });

        // Check for success message in URL (fallback if popup wasn't used)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('token_success')) {
            showNotification();
            // Clean URL
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        loadBrokers();
    </script>
</body>

</html>
