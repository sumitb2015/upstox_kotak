<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OI Pro — User Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #02080f;
            color: #f1f5f9;
            margin: 0;
            min-height: 100vh;
            padding-left: 6rem;
        }

        .glass {
            background: rgba(8, 15, 30, 0.7);
            backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.07);
        }

        .glass-input {
            background: rgba(3, 7, 18, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            outline: none;
            padding: 0.75rem 1rem;
            border-radius: 0.625rem;
        }

        .btn-cta {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #020812;
            font-weight: 800;
            border-radius: 0.625rem;
            padding: 0.75rem 1.5rem;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.2);
        }

        .btn-cta:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px rgba(16, 185, 129, 0.3);
        }

        .btn-ghost {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border-radius: 0.625rem;
            padding: 0.75rem 1.25rem;
            transition: all 0.2s;
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.09);
            color: white;
        }

        .user-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 0.5rem;
        }

        .user-table tr {
            background: rgba(255, 255, 255, 0.02);
            transition: background 0.2s;
        }

        .user-table tr:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .user-table td,
        .user-table th {
            padding: 1.25rem;
            text-align: left;
        }

        .user-table th {
            color: #64748b;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: none;
        }

        .role-badge {
            padding: 0.25rem 0.625rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .role-admin {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        .role-user {
            background: rgba(56, 189, 248, 0.15);
            color: #38bdf8;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 8, 18, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-card {
            background: #0b1221;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
        }
    </style>
</head>

<body class="p-8">
    <div id="sidebar-root"></div>

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight text-white mb-2">User Management</h1>
                <p class="text-slate-500">Manage internal accounts and access levels.</p>
            </div>
            <button onclick="openAddModal()" class="btn-cta">Add New User</button>
        </div>

        <div class="glass rounded-3xl overflow-hidden p-6">
            <table class="user-table">
                <thead>
                    <tr>
                        <th>User Account</th>
                        <th>Access Role</th>
                        <th>Created Date</th>
                        <th class="text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="user-list">
                    <!-- Users injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add User Modal -->
    <div id="add-modal" class="modal-overlay">
        <div class="modal-card">
            <h2 class="text-2xl font-bold text-white mb-6">Create New User</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Email Address</label>
                    <input id="new-email" type="email" class="glass-input w-full" placeholder="user@oipro.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Password</label>
                    <input id="new-password" type="password" class="glass-input w-full" placeholder="••••••••">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Role</label>
                    <select id="new-role" class="glass-input w-full appearance-none">
                        <option value="user">Standard User</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="closeAddModal()" class="btn-ghost flex-1">Cancel</button>
                    <button onclick="saveUser()" class="btn-cta flex-1">Save User</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/sidebar.js"></script>
    <script>
        const jwt = localStorage.getItem('oi_pro_jwt');

        async function loadUsers() {
            try {
                const res = await fetchWithAuth('/api/users', {
                    headers: { 'Authorization': `Bearer ${jwt}` }
                });
                if (!res.ok) throw new Error('Failed to fetch users');
                const users = await res.json();

                const container = document.getElementById('user-list');
                container.innerHTML = users.map(user => `
                    <tr>
                        <td>
                            <div class="font-bold text-white">${user.email}</div>
                            <div class="text-xs text-slate-500">${user.is_active ? 'Active' : 'Inactive'}</div>
                        </td>
                        <td>
                            <span class="role-badge role-${user.role}">${user.role}</span>
                        </td>
                        <td class="text-slate-400 text-sm">
                            ${new Date(user.created_at).toLocaleDateString()}
                        </td>
                        <td class="text-right">
                            <button onclick="deleteUser('${user.email}')" class="text-rose-500 hover:text-rose-400 font-bold text-xs uppercase tracking-widest">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        function openAddModal() { document.getElementById('add-modal').style.display = 'flex'; }
        function closeAddModal() { document.getElementById('add-modal').style.display = 'none'; }

        async function saveUser() {
            const email = document.getElementById('new-email').value;
            const password = document.getElementById('new-password').value;
            const role = document.getElementById('new-role').value;

            if (!email || !password) return alert('Email and password required');

            try {
                const res = await fetchWithAuth('/api/users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${jwt}`
                    },
                    body: JSON.stringify({ email, password, role })
                });
                if (!res.ok) throw new Error('Failed to save user');
                closeAddModal();
                loadUsers();
            } catch (err) {
                alert(err.message);
            }
        }

        async function deleteUser(email) {
            if (!confirm(`Are you sure you want to delete ${email}?`)) return;
            try {
                const res = await fetchWithAuth(`/api/users/${email}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${jwt}` }
                });
                if (!res.ok) throw new Error('Failed to delete user');
                loadUsers();
            } catch (err) {
                alert(err.message);
            }
        }

        loadUsers();
    </script>
</body>

</html>
