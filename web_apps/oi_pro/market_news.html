<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market News — OI Pro</title>
    <!-- Tailwind CSS (v3 standalone) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        background: 'var(--background)',
                        foreground: 'var(--foreground)',
                        card: 'var(--card)',
                        'card-foreground': 'var(--card-foreground)',
                        primary: 'var(--primary)',
                        'primary-foreground': 'var(--primary-foreground)',
                        secondary: 'var(--secondary)',
                        'secondary-foreground': 'var(--secondary-foreground)',
                        muted: 'var(--muted)',
                        'muted-foreground': 'var(--muted-foreground)',
                        accent: 'var(--accent)',
                        'accent-foreground': 'var(--accent-foreground)',
                        destructive: 'var(--destructive)',
                        border: 'var(--border)',
                        input: 'var(--input)',
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --background: #ffffff;
            --foreground: #09090b;
            --card: #ffffff;
            --card-foreground: #09090b;
            --popover: #ffffff;
            --popover-foreground: #09090b;
            --primary: #18181b;
            --primary-foreground: #fafafa;
            --secondary: #f4f4f5;
            --secondary-foreground: #18181b;
            --muted: #f4f4f5;
            --muted-foreground: #52525b;
            --accent: #f4f4f5;
            --accent-foreground: #18181b;
            --destructive: #ef4444;
            --destructive-foreground: #fafafa;
            --border: #e4e4e7;
            --input: #e4e4e7;
            --ring: #18181b;
        }

        .dark {
            --background: #09090b;
            --foreground: #fafafa;
            --card: #09090b;
            --card-foreground: #fafafa;
            --popover: #09090b;
            --popover-foreground: #fafafa;
            --primary: #fafafa;
            --primary-foreground: #18181b;
            --secondary: #27272a;
            --secondary-foreground: #fafafa;
            --muted: #27272a;
            --muted-foreground: #a1a1aa;
            --accent: #27272a;
            --accent-foreground: #fafafa;
            --destructive: #7f1d1d;
            --destructive-foreground: #fafafa;
            --border: #27272a;
            --input: #27272a;
            --ring: #d4d4d8;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.2s ease, color 0.2s ease;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .main-content {
            margin-left: 5.5rem;
            transition: margin-left 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                padding-bottom: 5rem;
            }
        }

        /* ── News-specific styles (Matched with News Pulse) ── */
        .news-card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.9rem 1rem 0.75rem;
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            animation: fadeUp 0.3s ease both;
        }

        .news-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            border-color: rgba(99, 102, 241, 0.35);
        }

        .dark .news-card:hover {
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .src-badge {
            border-radius: 9999px;
            padding: 0.12rem 0.5rem;
            font-size: 0.61rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }

        .src-et {
            background: rgba(59, 130, 246, 0.15);
            color: #2563eb;
        }

        .src-ndtv {
            background: rgba(234, 88, 12, 0.15);
            color: #c2410c;
        }

        .src-money {
            background: rgba(22, 163, 74, 0.15);
            color: #15803d;
        }

        .src-other {
            background: rgba(100, 116, 139, 0.1);
            color: #475569;
        }

        .dark .src-et {
            color: #93c5fd;
        }

        .dark .src-ndtv {
            color: #fdba74;
        }

        .dark .src-money {
            color: #86efac;
        }

        .dark .src-other {
            color: #94a3b8;
        }

        .card-title-link {
            color: var(--foreground);
            text-decoration: none;
            font-size: 0.84rem;
            font-weight: 600;
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: color 0.12s;
        }

        .card-title-link:hover {
            color: #6366f1;
        }

        /* Filter chips */
        .filter-chip {
            border-radius: 9999px;
            padding: 0.22rem 0.75rem;
            font-size: 0.71rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--secondary);
            color: var(--muted-foreground);
            transition: all 0.15s;
        }

        .filter-chip:hover {
            border-color: #6366f1;
            color: #6366f1;
        }

        .filter-chip.active {
            background: #6366f1;
            color: white;
            border-color: #6366f1;
        }

        /* News grid */
        #newsGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 0.75rem;
        }

        /* Spinner */
        .spin {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(99, 102, 241, 0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Search Bar */
        .search-field {
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.38rem 0.85rem;
            color: var(--foreground);
            font-size: 0.8rem;
            width: 200px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-field:focus {
            border-color: #6366f1;
        }

        .search-field::placeholder {
            color: var(--muted-foreground);
        }

        /* Indices Strip */
        .indices-glass {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border);
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
    </style>
</head>

<body class="antialiased">
    <!-- Sidebar -->
    <div id="sidebar-root"></div>
    <script src="/sidebar.js"></script>

    <!-- Main Content -->
    <div id="root" class="main-content"></div>

    <!-- React Implementation -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const TimeAgo = ({ dateString }) => {
            if (!dateString) return <span>⏱ ---</span>;
            const date = new Date(dateString);
            const now = new Date();
            const diffInSeconds = Math.floor((now - date) / 1000);

            if (diffInSeconds < 60) return <span>⏱ Just now</span>;
            if (diffInSeconds < 3600) return <span>⏱ {Math.floor(diffInSeconds / 60)}m</span>;
            if (diffInSeconds < 86400) return <span>⏱ {Math.floor(diffInSeconds / 3600)}h</span>;
            return <span>⏱ {Math.floor(diffInSeconds / 86400)}d</span>;
        }

        const MarketNews = () => {
            const [isDark, setIsDark] = useState(document.documentElement.classList.contains('dark'));
            const [marketPrices, setMarketPrices] = useState({});
            const [news, setNews] = useState([]);
            const [loading, setLoading] = useState(true);
            const [refreshing, setRefreshing] = useState(false);
            const [error, setError] = useState(null);
            const [page, setPage] = useState(1);
            const [hasMore, setHasMore] = useState(true);
            const [sourceFilter, setSourceFilter] = useState('All');
            const [searchTerm, setSearchTerm] = useState('');
            const [lastUpdated, setLastUpdated] = useState(null);

            const mwWsRef = useRef(null);
            const limit = 18;

            useEffect(() => {
                const handleTheme = () => setIsDark(document.documentElement.classList.contains('dark'));
                window.addEventListener('themeToggled', handleTheme);
                return () => window.removeEventListener('themeToggled', handleTheme);
            }, []);

            // WebSocket for Indices
            const connectIndices = () => {
                if (mwWsRef.current) return;
                const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
                const wsUrl = `${protocol}//${window.location.host}/ws/market-watch`;
                const finalUrl = (typeof window.getWsUrlWithAuth === 'function') ? window.getWsUrlWithAuth(wsUrl) : wsUrl;

                mwWsRef.current = new WebSocket(finalUrl);
                mwWsRef.current.onmessage = (e) => {
                    const msg = JSON.parse(e.data);
                    if (msg.type === "market_update") setMarketPrices(prev => ({ ...prev, ...msg.prices }));
                };
                mwWsRef.current.onclose = () => { mwWsRef.current = null; setTimeout(connectIndices, 3000); };
            };

            const fetchNews = async (pageNum, filter, reset = false) => {
                if (reset) setLoading(true);
                setError(null);
                try {
                    let url = `/api/news?page=${pageNum}&limit=${limit}`;
                    if (filter && filter !== 'All') url += `&source=${encodeURIComponent(filter)}`;

                    const resp = (typeof window.fetchWithAuth === 'function') ? await window.fetchWithAuth(url) : await fetch(url);
                    if (!resp.ok) throw new Error('API Error');

                    const json = await resp.json();
                    if (json.status === 'success') {
                        setNews(prev => reset ? json.data : [...prev, ...json.data]);
                        setHasMore(json.pagination.has_more);
                        if (json.last_updated) {
                            const d = new Date(json.last_updated);
                            setLastUpdated(d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }));
                        }
                    }
                } catch (e) {
                    setError("Could not load news.");
                } finally {
                    setLoading(false);
                }
            };

            const handleRefresh = async () => {
                setRefreshing(true);
                await fetchNews(1, sourceFilter, true);
                setPage(1);
                setRefreshing(false);
            };

            useEffect(() => {
                connectIndices();
                fetchNews(1, sourceFilter, true);
                const timer = setInterval(() => fetchNews(1, sourceFilter, true), 300000);
                return () => { if (mwWsRef.current) mwWsRef.current.close(); clearInterval(timer); };
            }, [sourceFilter]);

            const filteredNews = useMemo(() => {
                if (!searchTerm) return news;
                const q = searchTerm.toLowerCase();
                return news.filter(item =>
                    item.title.toLowerCase().includes(q) ||
                    item.summary.toLowerCase().includes(q)
                );
            }, [news, searchTerm]);

            const getSrcCls = (s) => {
                const l = s.toLowerCase();
                if (l.includes('economic times')) return 'src-et';
                if (l.includes('ndtv')) return 'src-ndtv';
                if (l.includes('moneycontrol')) return 'src-money';
                return 'src-other';
            };

            return (
                <div className="p-6 max-w-[1400px] mx-auto">
                    {/* Header Row */}
                    <div className="flex items-center gap-3 mb-5 flex-wrap">
                        <div>
                            <h1 className="text-2xl font-bold tracking-tight text-foreground flex items-center gap-2">
                                <span>📰</span> Market <span className="text-indigo-500">News</span>
                            </h1>
                            <p className="text-sm text-muted-foreground mt-0.5">Aggregated Indian business and financial headlines</p>
                        </div>

                        <div className="ml-auto flex items-center gap-2.5 flex-wrap">
                            <span className="text-xs text-muted-foreground">
                                {lastUpdated ? `Updated ${lastUpdated}` : ''}
                            </span>
                            <input
                                type="text"
                                className="search-field"
                                placeholder="Search headlines…"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                            <button
                                onClick={handleRefresh}
                                disabled={refreshing}
                                className="px-3 py-1.5 rounded-md bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold transition-colors disabled:opacity-50 flex items-center gap-1.5"
                            >
                                {refreshing ? <div className="spin border-white/30 border-t-white w-3 h-3"></div> : '🔄'} Refresh
                            </button>
                        </div>
                    </div>

                    {/* Source Filters */}
                    <div className="flex items-center gap-2 flex-wrap mb-4">
                        <span className="text-[10px] font-bold uppercase tracking-widest text-muted-foreground">Source</span>
                        {["All", "Economic Times", "Moneycontrol", "NDTV Profit"].map(src => (
                            <button
                                key={src}
                                onClick={() => { setSourceFilter(src); setPage(1); }}
                                className={`filter-chip ${sourceFilter === src ? 'active' : ''}`}
                            >
                                {src}
                            </button>
                        ))}
                    </div>

                    {/* Indices Strip (Pulse Style) */}
                    <div className="indices-glass px-4 py-3 rounded-xl mb-6 flex overflow-x-auto space-x-8 items-center border border-border/50 shadow-sm">
                        {["NIFTY", "BANKNIFTY", "SENSEX", "FINNIFTY", "MIDCPNIFTY", "NIFTYIT"].map(sym => {
                            const data = marketPrices[sym];
                            const ltp = data?.ltp || 0;
                            const chg = data?.chg || 0;
                            const color = chg > 0 ? 'text-emerald-400' : chg < 0 ? 'text-red-400' : 'text-neutral-400';
                            return (
                                <div key={sym} className="flex flex-col min-w-fit">
                                    <span className="text-[9px] uppercase tracking-wider text-muted-foreground font-bold">{sym}</span>
                                    <div className="flex items-baseline gap-2">
                                        <span className="text-sm font-bold">{ltp ? ltp.toLocaleString('en-IN') : '---'}</span>
                                        <span className={`text-[10px] font-bold ${color}`}>{chg > 0 ? '+' : ''}{chg.toFixed(2)}%</span>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* News Grid */}
                    {loading && page === 1 ? (
                        <div id="newsGrid">
                            {[...Array(6)].map((_, i) => (
                                <div key={i} className="news-card animate-pulse opacity-50">
                                    <div className="h-3 w-16 bg-muted rounded-full"></div>
                                    <div className="h-4 w-full bg-muted rounded"></div>
                                    <div className="h-4 w-2/3 bg-muted rounded"></div>
                                </div>
                            ))}
                        </div>
                    ) : error ? (
                        <div className="text-center py-16 text-rose-400 font-semibold border border-rose-500/10 rounded-xl bg-rose-500/5">⚠️ {error}</div>
                    ) : filteredNews.length === 0 ? (
                        <div className="text-center py-16 text-muted-foreground border border-border rounded-xl">No articles found.</div>
                    ) : (
                        <>
                            <div id="newsGrid">
                                {filteredNews.map((item, idx) => (
                                    <div key={`${item.id}-${idx}`} className="news-card" style={{ animationDelay: `${Math.min(idx * 0.02, 0.4)}s` }}>
                                        <div className="flex items-center gap-1.5">
                                            <span className={`src-badge ${getSrcCls(item.source)}`}>{item.source}</span>
                                            <span className="ml-auto text-[10px] text-muted-foreground whitespace-nowrap">
                                                <TimeAgo dateString={item.published_at} />
                                            </span>
                                        </div>
                                        <div>
                                            <a className="card-title-link" href={item.url} target="_blank" rel="noopener noreferrer">
                                                {item.title}
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {hasMore && (
                                <div className="text-center mt-8 pb-10">
                                    <button
                                        onClick={() => { setPage(p => p + 1); fetchNews(page + 1, sourceFilter, false); }}
                                        className="px-6 py-2 rounded-md border border-border text-sm font-semibold text-muted-foreground hover:border-indigo-500 hover:text-indigo-500 transition-colors"
                                    >
                                        Load More ↓
                                    </button>
                                </div>
                            )}
                        </>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MarketNews />);
    </script>
</body>

</html>
