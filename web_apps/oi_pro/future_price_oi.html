<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Price vs OI | OI Pro</title>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        background: 'var(--background)',
                        foreground: 'var(--foreground)',
                        card: 'var(--card)',
                        'card-foreground': 'var(--card-foreground)',
                        border: 'var(--border)',
                        muted: 'var(--muted)',
                        'muted-foreground': 'var(--muted-foreground)',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --background: #f8fafc;
            --foreground: #020817;
            --card: #ffffff;
            --card-foreground: #020817;
            --muted: #f1f5f9;
            --muted-foreground: #64748b;
            --border: #e2e8f0;
        }

        .dark {
            --background: #020817;
            --foreground: #f8fafc;
            --card: #0f172a;
            --card-foreground: #f8fafc;
            --muted: #1e293b;
            --muted-foreground: #94a3b8;
            --border: #334155;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: 'Inter', sans-serif;
            font-weight: 700;
        }
    </style>
</head>

<body class="bg-background text-foreground overflow-hidden">
    <div id="sidebar-root"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const formatNumber = (num) => {
            if (num >= 10000000) return (num / 10000000).toFixed(2) + 'Cr';
            if (num >= 100000) return (num / 100000).toFixed(2) + 'L';
            if (num >= 1000) return (num / 1000).toFixed(2) + 'K';
            return num.toString();
        };

        function FuturePriceOi() {
            const [symbol, setSymbol] = useState("NIFTY");
            const [loading, setLoading] = useState(true);
            const [lastUpdated, setLastUpdated] = useState("");

            const wsRef = useRef(null);
            const chartDataRef = useRef({ times: [], prices: [], ois: [] });

            useEffect(() => {
                let isMounted = true;

                const fetchHistoryAndConnectWs = async () => {
                    setLoading(true);
                    try {
                        const token = localStorage.getItem("oi_pro_jwt") || localStorage.getItem("token");
                        const headers = { 'Authorization': `Bearer ${token}` };

                        // 1. Fetch History
                        const res = await fetch(`/api/future-price-oi-history?symbol=${symbol}`, { headers });
                        const result = await res.json();

                        if (!isMounted) return;

                        if (result.status === "success" && result.data) {
                            // Extract data
                            const times = [];
                            const prices = [];
                            const ois = [];

                            // Sort by time ascending
                            const sortedData = result.data.sort((a, b) => new Date(a.time) - new Date(b.time));

                            sortedData.forEach(d => {
                                times.push(new Date(d.time));
                                prices.push(d.price);
                                ois.push(d.oi);
                            });

                            chartDataRef.current = { times, prices, ois };
                            renderChart();

                            // Initialize WebSocket
                            connectWebSocket(token);
                        }
                    } catch (e) {
                        console.error("Error loading history", e);
                    } finally {
                        if (isMounted) setLoading(false);
                    }
                };

                const connectWebSocket = (token) => {
                    if (wsRef.current) wsRef.current.close();

                    const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
                    const wsUrl = `${protocol}//${window.location.host}/ws/future-price-oi/${symbol}?token=${token}`;

                    const ws = new WebSocket(wsUrl);
                    wsRef.current = ws;

                    ws.onopen = () => console.log(`Connected to WS for ${symbol}`);

                    ws.onmessage = (event) => {
                        const data = JSON.parse(event.data);
                        if (data.type === "future-price-oi") {
                            const time = new Date(data.time);

                            // Live update the chart
                            Plotly.extendTraces('plotly-chart', {
                                x: [[time], [time]],
                                y: [[data.price], [data.oi]]
                            }, [0, 1]);

                            setLastUpdated(time.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true }));
                        }
                    };

                    ws.onclose = () => console.log("WS closed");
                };

                fetchHistoryAndConnectWs();

                return () => {
                    isMounted = false;
                    if (wsRef.current) wsRef.current.close();
                };
            }, [symbol]);

            const renderChart = () => {
                const { times, prices, ois } = chartDataRef.current;

                const isDark = document.body.classList.contains('dark') ||
                    window.matchMedia('(prefers-color-scheme: dark)').matches;

                const textColor = isDark ? '#f8fafc' : '#020817';
                const gridColor = isDark ? '#334155' : '#e2e8f0';

                const priceTrace = {
                    x: times,
                    y: prices,
                    name: 'Price',
                    mode: 'lines',
                    line: { color: isDark ? '#94a3b8' : '#64748b', width: 2, dash: 'dot' },
                    yaxis: 'y1'
                };

                const oiTrace = {
                    x: times,
                    y: ois,
                    name: 'OI',
                    mode: 'lines',
                    line: { color: '#3b82f6', width: 2 },
                    yaxis: 'y2'
                };

                const layout = {
                    title: false,
                    showlegend: true,
                    legend: { orientation: 'h', x: 0, y: 1.1 },
                    margin: { t: 40, r: 60, b: 40, l: 60 },
                    paper_bgcolor: 'transparent',
                    plot_bgcolor: 'transparent',
                    font: { color: textColor },
                    xaxis: {
                        type: 'date',
                        tickformat: '%I:%M %p',
                        showgrid: true,
                        gridcolor: gridColor
                    },
                    yaxis: {
                        title: 'Price',
                        side: 'left',
                        showgrid: true,
                        gridcolor: gridColor,
                        tickformat: ','
                    },
                    yaxis2: {
                        title: 'Open Interest',
                        side: 'right',
                        overlaying: 'y',
                        showgrid: false,
                        tickformat: '.2s'
                    },
                    hovermode: 'x unified'
                };

                Plotly.newPlot('plotly-chart', [priceTrace, oiTrace], layout, { responsive: true, displayModeBar: false });
            };

            return (
                <div className="min-h-screen bg-transparent p-6 pr-10 pl-28">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                        <h1 className="text-2xl font-black flex items-center gap-3">
                            <span className="text-blue-500">
                                <svg xmlns="http://www.0000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                            </span>
                            Future Price vs OI
                        </h1>

                        <div className="flex items-center gap-4">
                            <select
                                value={symbol}
                                onChange={(e) => setSymbol(e.target.value)}
                                className="bg-card border-border rounded-xl px-4 py-2 text-sm font-black focus:ring-2 focus:ring-blue-500 outline-none"
                            >
                                <option value="NIFTY">NIFTY</option>
                                <option value="BANKNIFTY">BANKNIFTY</option>
                                <option value="FINNIFTY">FINNIFTY</option>
                            </select>
                            <div className="text-[10px] text-muted-foreground text-right w-32">
                                <p className="font-black uppercase tracking-widest">Last updated</p>
                                <p className="text-foreground text-sm">{lastUpdated || "--:--"}</p>
                            </div>
                        </div>
                    </div>

                    <div className="bg-card/60 backdrop-blur-md rounded-3xl border border-border/50 p-6 shadow-2xl h-[calc(100vh-140px)]">
                        {loading && chartDataRef.current.times.length === 0 ? (
                            <div className="flex justify-center items-center h-full">
                                <p className="text-muted-foreground font-black animate-pulse">Loading Chart Data...</p>
                            </div>
                        ) : (
                            <div id="plotly-chart" className="w-full h-full"></div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FuturePriceOi />);

        const sidebarScript = document.createElement('script');
        sidebarScript.src = 'sidebar.js';
        sidebarScript.onload = () => {
            const sidebarRoot = ReactDOM.createRoot(document.getElementById('sidebar-root'));
            sidebarRoot.render(<Sidebar activePage="Future Price vs OI" />);
        };
        document.body.appendChild(sidebarScript);
    </script>
</body>

</html>
