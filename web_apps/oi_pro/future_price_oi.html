<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Price vs OI | OI Pro</title>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        background: 'var(--background)',
                        foreground: 'var(--foreground)',
                        card: 'var(--card)',
                        'card-foreground': 'var(--card-foreground)',
                        border: 'var(--border)',
                        muted: 'var(--muted)',
                        'muted-foreground': 'var(--muted-foreground)',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --background: #f8fafc;
            --foreground: #020817;
            --card: #ffffff;
            --card-foreground: #020817;
            --muted: #f1f5f9;
            --muted-foreground: #64748b;
            --border: #e2e8f0;
        }

        .dark {
            --background: #020817;
            --foreground: #f8fafc;
            --card: #0f172a;
            --card-foreground: #f8fafc;
            --muted: #1e293b;
            --muted-foreground: #94a3b8;
            --border: #334155;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: 'Inter', sans-serif;
            font-weight: 700;
        }
    </style>
</head>

<body class="bg-background text-foreground overflow-hidden">
    <div id="sidebar-root"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const formatNumber = (num) => {
            if (num >= 10000000) return (num / 10000000).toFixed(2) + 'Cr';
            if (num >= 100000) return (num / 100000).toFixed(2) + 'L';
            if (num >= 1000) return (num / 1000).toFixed(2) + 'K';
            return num.toString();
        };

        function FuturePriceOi() {
            const [symbol, setSymbol] = useState("NIFTY");
            const [loading, setLoading] = useState(true);
            const [lastUpdated, setLastUpdated] = useState("");

            // New KPI State
            const [currentFuture, setCurrentFuture] = useState(0);
            const [currentSpot, setCurrentSpot] = useState(0);
            const [currentOi, setCurrentOi] = useState(0);

            const wsRef = useRef(null);
            const chartDataRef = useRef({ times: [], prices: [], ois: [] });

            // Handle Theme Changes (Make chart reactive)
            useEffect(() => {
                const handleThemeChange = () => {
                    if (chartDataRef.current.times.length > 0) {
                        renderChart();
                    }
                };
                window.addEventListener('themeToggled', handleThemeChange);
                return () => window.removeEventListener('themeToggled', handleThemeChange);
            }, []);

            useEffect(() => {
                let isMounted = true;

                const fetchHistory = async () => {
                    setLoading(true);
                    try {
                        const token = localStorage.getItem("oi_pro_jwt") || localStorage.getItem("token");
                        const headers = { 'Authorization': `Bearer ${token}` };

                        // 1. Fetch History
                        const res = await fetch(`/api/future-price-oi-history?symbol=${symbol}`, { headers });
                        const result = await res.json();
                        console.log("Future OI History Result:", result);

                        if (!isMounted) return;

                        if (result.status === "success" && result.data) {
                            // Extract data
                            const times = [];
                            const prices = [];
                            const ois = [];

                            // Sort by time ascending
                            const sortedData = result.data.sort((a, b) => new Date(a.time) - new Date(b.time));

                            sortedData.forEach(d => {
                                times.push(new Date(d.time));
                                prices.push(d.price);
                                ois.push(d.oi);
                            });

                            chartDataRef.current = { times, prices, ois };

                            // Initialize KPIs
                            if (prices.length > 0) {
                                setCurrentFuture(prices[prices.length - 1]);
                                setCurrentOi(ois[ois.length - 1]);
                                setCurrentSpot(result.spot_price || 0);
                            }

                            if (times.length > 0) {
                                setLastUpdated(times[times.length - 1].toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true }));
                            }
                            // connectWebSocket will happen in its own effect or after loading
                            connectWebSocket(token);
                        }
                    } catch (e) {
                        console.error("Error loading history", e);
                    } finally {
                        if (isMounted) setLoading(false);
                    }
                };

                const connectWebSocket = (token) => {
                    if (wsRef.current) wsRef.current.close();

                    const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
                    const wsUrl = `${protocol}//${window.location.host}/ws/future-price-oi/${symbol}?token=${token}`;

                    const ws = new WebSocket(wsUrl);
                    wsRef.current = ws;

                    ws.onopen = () => console.log(`Connected to WS for ${symbol}`);

                    ws.onmessage = (event) => {
                        const data = JSON.parse(event.data);
                        if (data.type === "future-price-oi") {
                            const time = new Date(data.time);

                            // Update KPIs
                            setCurrentFuture(data.price);
                            setCurrentSpot(data.spot || 0);
                            setCurrentOi(data.oi);

                            const chartDiv = document.getElementById('plotly-chart');

                            if (chartDiv && chartDiv.data) {
                                const { times, prices, ois } = chartDataRef.current;
                                const lastIdx = times.length - 1;

                                // Bucketing Logic: 
                                // Check if the new tick belongs to the SAME minute as the last point
                                const isSameMinute = lastIdx >= 0 &&
                                    times[lastIdx].getHours() === time.getHours() &&
                                    times[lastIdx].getMinutes() === time.getMinutes();

                                if (isSameMinute) {
                                    // UPDATE the latest point (candle rounding)
                                    times[lastIdx] = time;
                                    prices[lastIdx] = data.price;
                                    ois[lastIdx] = data.oi;

                                    // Efficiently update the LAST point in Plotly
                                    Plotly.restyle('plotly-chart', {
                                        x: [[...times]],
                                        y: [[...prices], [...ois]]
                                    });
                                } else {
                                    // APPEND a new minute point
                                    times.push(time);
                                    prices.push(data.price);
                                    ois.push(data.oi);

                                    Plotly.extendTraces('plotly-chart', {
                                        x: [[time], [time]],
                                        y: [[data.price], [data.oi]]
                                    }, [0, 1]);
                                }

                                // Maintain 15-min padding
                                const endRange = new Date(time.getTime() + 15 * 60 * 1000);
                                Plotly.relayout('plotly-chart', {
                                    'xaxis.range': [times[0], endRange]
                                });

                                setLastUpdated(time.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true }));
                            }
                        }
                    };

                    ws.onclose = () => console.log("WS closed");
                };

                fetchHistory();

                return () => {
                    isMounted = false;
                    if (wsRef.current) wsRef.current.close();
                };
            }, [symbol]);

            // Separate Effect for Rendering the Chart (Ensures DOM element exists)
            useEffect(() => {
                if (!loading && chartDataRef.current.times.length > 0) {
                    renderChart();
                }
            }, [loading, symbol]);

            const renderChart = () => {
                const { times, prices, ois } = chartDataRef.current;

                // FIX: Check documentElement for theme as per sidebar.js
                const isDark = document.documentElement.classList.contains('dark');

                const textColor = isDark ? '#f8fafc' : '#020817';
                const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
                const accentColor = isDark ? '#3b82f6' : '#2563eb'; // Blue for OI
                const priceColor = '#f59e0b'; // Amber/Gold for Price - Professional

                const priceTrace = {
                    x: times,
                    y: prices,
                    name: 'Future Price',
                    mode: 'lines',
                    line: { color: priceColor, width: 2 },
                    yaxis: 'y1',
                    hovertemplate: `<b>Price:</b> %{y:,.2f}<extra></extra>`
                };

                const oiTrace = {
                    x: times,
                    y: ois,
                    name: 'Open Interest',
                    mode: 'lines',
                    line: { color: accentColor, width: 3 },
                    yaxis: 'y2',
                    hovertemplate: `<b>OI:</b> %{y:,.0f}<extra></extra>`
                };

                // Calculate X-axis range for padding (15 mins on the right)
                const lastTime = times[times.length - 1];
                const endRange = new Date(lastTime.getTime() + 15 * 60 * 1000);

                const layout = {
                    title: false,
                    showlegend: true,
                    legend: {
                        orientation: 'h',
                        x: 0,
                        y: 1.1,
                        font: { size: 11, color: textColor },
                        bgcolor: 'transparent'
                    },
                    margin: { t: 40, r: 80, b: 40, l: 80 },
                    paper_bgcolor: 'transparent',
                    plot_bgcolor: 'transparent',
                    font: { color: textColor, family: 'Inter, sans-serif' },
                    xaxis: {
                        type: 'date',
                        range: [times[0], endRange],
                        tickformat: '%I:%M %p',
                        showgrid: true,
                        gridcolor: gridColor,
                        tickfont: { color: textColor, size: 10 },
                        linecolor: gridColor
                    },
                    yaxis: {
                        title: { text: 'Future Price', font: { size: 12, color: priceColor, weight: 'bold' } },
                        side: 'left',
                        showgrid: true,
                        gridcolor: gridColor,
                        tickformat: ',',
                        tickfont: { color: textColor, size: 10 },
                        zeroline: false
                    },
                    yaxis2: {
                        title: { text: 'Open Interest', font: { size: 12, color: accentColor, weight: 'bold' } },
                        side: 'right',
                        overlaying: 'y',
                        showgrid: false,
                        tickformat: '.2s',
                        tickfont: { color: textColor, size: 10 },
                        zeroline: false
                    },
                    hovermode: 'x unified',
                    hoverlabel: {
                        bgcolor: isDark ? '#1e293b' : '#ffffff',
                        bordercolor: gridColor,
                        font: { color: textColor, family: 'Inter' }
                    }
                };

                const config = {
                    responsive: true,
                    displayModeBar: false,
                    scrollZoom: false
                };

                Plotly.newPlot('plotly-chart', [priceTrace, oiTrace], layout, config);
            };

            return (
                <div className="min-h-screen bg-transparent p-6 pr-10 pl-28">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                        <div className="flex items-center gap-6">
                            <h1 className="text-2xl font-black flex items-center gap-3">
                                <span className="text-blue-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                                </span>
                                Future Price vs OI
                            </h1>

                            {/* KPI Grid */}
                            <div className="hidden lg:flex items-center gap-4 border-l border-border/50 pl-6">
                                <div className="glass px-4 py-2 rounded-xl flex flex-col">
                                    <span className="text-[9px] font-black uppercase tracking-tighter text-amber-500/80">Future Price</span>
                                    <span className="text-sm font-black text-foreground">₹{currentFuture?.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</span>
                                </div>
                                <div className="glass px-4 py-2 rounded-xl flex flex-col border-l-2 border-emerald-500">
                                    <span className="text-[9px] font-black uppercase tracking-tighter text-emerald-500/80">Spot Price</span>
                                    <span className="text-sm font-black text-foreground">₹{currentSpot?.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</span>
                                </div>
                                <div className="glass px-4 py-2 rounded-xl flex flex-col border-l-2 border-blue-500">
                                    <span className="text-[9px] font-black uppercase tracking-tighter text-blue-500/80">Total OI</span>
                                    <span className="text-sm font-black text-foreground">{formatNumber(currentOi)}</span>
                                </div>
                            </div>
                        </div>

                        <div className="flex items-center gap-4">
                            <select
                                value={symbol}
                                onChange={(e) => setSymbol(e.target.value)}
                                className="bg-card border-border rounded-xl px-4 py-2 text-sm font-black focus:ring-2 focus:ring-blue-500 outline-none"
                            >
                                <option value="NIFTY">NIFTY</option>
                                <option value="BANKNIFTY">BANKNIFTY</option>
                                <option value="FINNIFTY">FINNIFTY</option>
                            </select>
                            <div className="text-[10px] text-muted-foreground text-right w-32">
                                <p className="font-black uppercase tracking-widest">Last updated</p>
                                <p className="text-foreground text-sm">{lastUpdated || "--:--"}</p>
                            </div>
                        </div>
                    </div>

                    <div className="bg-card/60 backdrop-blur-md rounded-3xl border border-border/50 p-6 shadow-2xl h-[calc(100vh-140px)]">
                        {loading && chartDataRef.current.times.length === 0 ? (
                            <div className="flex justify-center items-center h-full">
                                <p className="text-muted-foreground font-black animate-pulse">Loading Chart Data...</p>
                            </div>
                        ) : (
                            <div id="plotly-chart" className="w-full h-full"></div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FuturePriceOi />);
    </script>
    <script src="/sidebar.js"></script>
</body>

</html>
