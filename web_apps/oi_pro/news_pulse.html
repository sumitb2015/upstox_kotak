<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Pulse — OI Pro</title>
    <!-- Tailwind CSS (v3 standalone) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        background: 'var(--background)',
                        foreground: 'var(--foreground)',
                        card: 'var(--card)',
                        'card-foreground': 'var(--card-foreground)',
                        primary: 'var(--primary)',
                        'primary-foreground': 'var(--primary-foreground)',
                        secondary: 'var(--secondary)',
                        'secondary-foreground': 'var(--secondary-foreground)',
                        muted: 'var(--muted)',
                        'muted-foreground': 'var(--muted-foreground)',
                        accent: 'var(--accent)',
                        'accent-foreground': 'var(--accent-foreground)',
                        destructive: 'var(--destructive)',
                        border: 'var(--border)',
                        input: 'var(--input)',
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --background: #ffffff;
            --foreground: #09090b;
            --card: #ffffff;
            --card-foreground: #09090b;
            --popover: #ffffff;
            --popover-foreground: #09090b;
            --primary: #18181b;
            --primary-foreground: #fafafa;
            --secondary: #f4f4f5;
            --secondary-foreground: #18181b;
            --muted: #f4f4f5;
            --muted-foreground: #52525b;
            --accent: #f4f4f5;
            --accent-foreground: #18181b;
            --destructive: #ef4444;
            --destructive-foreground: #fafafa;
            --border: #e4e4e7;
            --input: #e4e4e7;
            --ring: #18181b;
        }

        .dark {
            --background: #09090b;
            --foreground: #fafafa;
            --card: #09090b;
            --card-foreground: #fafafa;
            --popover: #09090b;
            --popover-foreground: #fafafa;
            --primary: #fafafa;
            --primary-foreground: #18181b;
            --secondary: #27272a;
            --secondary-foreground: #fafafa;
            --muted: #27272a;
            --muted-foreground: #a1a1aa;
            --accent: #27272a;
            --accent-foreground: #fafafa;
            --destructive: #7f1d1d;
            --destructive-foreground: #fafafa;
            --border: #27272a;
            --input: #27272a;
            --ring: #d4d4d8;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .main-content {
            margin-left: 5.5rem;
            transition: margin-left 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                padding-bottom: 5rem;
            }
        }

        /* ── News-specific styles ─────────────────────────── */
        .news-card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.9rem 1rem 0.75rem;
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            animation: fadeUp 0.3s ease both;
        }

        .news-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            border-color: rgba(99, 102, 241, 0.35);
        }

        .dark .news-card:hover {
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .src-badge {
            border-radius: 9999px;
            padding: 0.12rem 0.5rem;
            font-size: 0.61rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }

        .src-et {
            background: rgba(59, 130, 246, 0.15);
            color: #2563eb;
        }

        .src-ndtv {
            background: rgba(234, 88, 12, 0.15);
            color: #c2410c;
        }

        .src-hindu {
            background: rgba(22, 163, 74, 0.15);
            color: #15803d;
        }

        .src-fin {
            background: rgba(147, 51, 234, 0.15);
            color: #7e22ce;
        }

        .src-other {
            background: rgba(100, 116, 139, 0.1);
            color: #475569;
        }

        .dark .src-et {
            color: #93c5fd;
        }

        .dark .src-ndtv {
            color: #fdba74;
        }

        .dark .src-hindu {
            color: #86efac;
        }

        .dark .src-fin {
            color: #d8b4fe;
        }

        .dark .src-other {
            color: #94a3b8;
        }

        .rel-badge {
            background: rgba(251, 191, 36, 0.12);
            color: #d97706;
            border-radius: 9999px;
            padding: 0.1rem 0.45rem;
            font-size: 0.58rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .dark .rel-badge {
            color: #fbbf24;
        }

        .card-title-link {
            color: var(--foreground);
            text-decoration: none;
            font-size: 0.84rem;
            font-weight: 600;
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: color 0.12s;
        }

        .card-title-link:hover {
            color: #6366f1;
        }

        /* Filter chips */
        .filter-chip {
            border-radius: 9999px;
            padding: 0.22rem 0.75rem;
            font-size: 0.71rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--secondary);
            color: var(--muted-foreground);
            transition: all 0.15s;
            font-family: 'Inter', sans-serif;
        }

        .filter-chip:hover {
            border-color: #6366f1;
            color: #6366f1;
        }

        .filter-chip.active {
            background: #6366f1;
            color: white;
            border-color: #6366f1;
        }

        /* Tags */
        .tag {
            border-radius: 9999px;
            padding: 0.15rem 0.55rem;
            font-size: 0.68rem;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted-foreground);
            transition: all 0.12s;
            font-family: 'Inter', sans-serif;
        }

        .tag:hover,
        .tag.active {
            background: rgba(99, 102, 241, 0.15);
            border-color: #6366f1;
            color: #6366f1;
        }

        .dark .tag:hover,
        .dark .tag.active {
            color: #a5b4fc;
        }

        /* Stat card */
        .stat-card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.625rem;
            padding: 0.7rem 1rem;
            flex: 1 1 120px;
        }

        /* News grid */
        #newsGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 0.75rem;
        }

        /* Spinner */
        .spin {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(99, 102, 241, 0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Search */
        #searchBar {
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.38rem 0.85rem;
            color: var(--foreground);
            font-size: 0.8rem;
            width: 200px;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }

        #searchBar:focus {
            border-color: #6366f1;
        }

        #searchBar::placeholder {
            color: var(--muted-foreground);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .trending-bar {
            display: none;
        }
    </style>
</head>

<body class="antialiased">
    <!-- Sidebar -->
    <div id="sidebar-root"></div>
    <script src="/sidebar.js"></script>

    <!-- Main Content -->
    <div class="main-content">
        <div class="p-6">

            <!-- Page Header -->
            <div class="flex items-center gap-3 mb-5 flex-wrap">
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-foreground flex items-center gap-2">
                        <span>📰</span> News<span class="text-indigo-500">Pulse</span>
                    </h1>
                    <p class="text-sm text-muted-foreground mt-0.5">Live Indian financial news from all major sources
                    </p>
                </div>

                <div class="ml-auto flex items-center gap-2.5 flex-wrap">
                    <span
                        class="text-xs font-semibold px-2.5 py-1 rounded-full bg-indigo-500/10 text-indigo-500 border border-indigo-500/25 dark:text-indigo-300"
                        id="totalBadge"></span>
                    <span class="text-xs text-muted-foreground" id="lastUpdated"></span>
                    <input type="text" id="searchBar" placeholder="Search news…" />
                    <button id="refreshBtn" onclick="triggerRefresh()"
                        class="px-3 py-1.5 rounded-md bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold transition-colors disabled:opacity-50">🔄
                        Refresh</button>
                </div>
            </div>

            <!-- Trending Tags -->
            <div class="trending-bar bg-card border border-border rounded-lg px-3 py-2 mb-3 overflow-x-auto"
                id="trendingBar">
                <div class="flex items-center gap-2 whitespace-nowrap">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-muted-foreground mr-1">🔥
                        Trending</span>
                    <span id="trendingTags" class="flex gap-1.5"></span>
                </div>
            </div>

            <!-- Source Filters -->
            <div class="flex items-center gap-2 flex-wrap mb-4">
                <span class="text-[10px] font-bold uppercase tracking-widest text-muted-foreground">Source</span>
                <button class="filter-chip active" data-source="all" onclick="setFilter('all')">All</button>
                <button class="filter-chip" data-source="Economic Times" onclick="setFilter('Economic Times')">Economic
                    Times</button>
                <button class="filter-chip" data-source="NDTV Business" onclick="setFilter('NDTV Business')">NDTV
                    Business</button>
                <button class="filter-chip" data-source="The Hindu Business"
                    onclick="setFilter('The Hindu Business')">The Hindu</button>
                <button class="filter-chip" data-source="Finshots" onclick="setFilter('Finshots')">Finshots</button>
            </div>

            <!-- Stats -->
            <div class="flex gap-2 flex-wrap mb-4" id="statsRow" style="display:none !important">
                <div class="stat-card">
                    <div class="text-[10px] font-bold uppercase tracking-widest text-muted-foreground mb-1">Total</div>
                    <div class="text-2xl font-black text-indigo-500" id="statTotal">—</div>
                </div>
                <div class="stat-card">
                    <div class="text-[10px] font-bold uppercase tracking-widest text-muted-foreground mb-1">Economic
                        Times</div>
                    <div class="text-2xl font-black text-blue-500" id="statET">—</div>
                </div>
                <div class="stat-card">
                    <div class="text-[10px] font-bold uppercase tracking-widest text-muted-foreground mb-1">NDTV
                        Business</div>
                    <div class="text-2xl font-black text-orange-500" id="statNDTV">—</div>
                </div>
                <div class="stat-card">
                    <div class="text-[10px] font-bold uppercase tracking-widest text-muted-foreground mb-1">The Hindu
                    </div>
                    <div class="text-2xl font-black text-emerald-600" id="statHindu">—</div>
                </div>
                <div class="stat-card">
                    <div class="text-[10px] font-bold uppercase tracking-widest text-muted-foreground mb-1">Others</div>
                    <div class="text-2xl font-black text-purple-500" id="statOther">—</div>
                </div>
            </div>

            <!-- Spinner -->
            <div id="spinner" class="flex items-center justify-center py-16 gap-3 text-muted-foreground text-sm">
                <div class="spin"></div> Loading news…
            </div>

            <!-- Grid -->
            <div id="newsGrid"></div>

            <!-- Empty -->
            <div id="emptyState" style="display:none" class="text-center py-16 text-muted-foreground">
                <div class="text-4xl mb-3">🔍</div>
                <p class="text-sm">No articles match your search.</p>
            </div>

            <!-- Load More -->
            <div id="loadMoreWrap" style="display:none" class="text-center mt-6">
                <button onclick="loadMore()"
                    class="px-6 py-2 rounded-md border border-border text-sm font-semibold text-muted-foreground hover:border-indigo-500 hover:text-indigo-500 transition-colors">Load
                    More ↓</button>
            </div>

        </div>
    </div>

    <script>
        // ── State ──────────────────────────────────────────────────
        let allArticles = [], filtered = [];
        let currentFilter = 'all', currentSearch = '', currentTag = '';
        let displayCount = 50;
        const PAGE_SIZE = 50;

        const srcClass = s => {
            if (!s) return 'src-other';
            const l = s.toLowerCase();
            if (l.includes('economic times')) return 'src-et';
            if (l.includes('ndtv')) return 'src-ndtv';
            if (l.includes('hindu')) return 'src-hindu';
            if (l.includes('finshots')) return 'src-fin';
            return 'src-other';
        };

        async function fetchNews() {
            try {
                const res = await fetchWithAuth('/api/news-pulse');
                if (!res.ok) throw new Error('API error ' + res.status);
                const data = await res.json();
                allArticles = data.articles || [];
                if (data.last_updated) {
                    const d = new Date(data.last_updated * 1000);
                    document.getElementById('lastUpdated').textContent =
                        'Updated ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
                }
                updateStats(allArticles);
                buildTrending(allArticles);
                applyFilters();
            } catch (e) {
                console.error('[NewsPulse] fetch error', e);
            } finally {
                document.getElementById('spinner').style.display = 'none';
            }
        }

        function updateStats(a) {
            const et = a.filter(x => (x.source || '').includes('Economic Times')).length;
            const ndtv = a.filter(x => (x.source || '').includes('NDTV')).length;
            const hindu = a.filter(x => (x.source || '').includes('Hindu')).length;
            const other = a.length - et - ndtv - hindu;
            document.getElementById('statTotal').textContent = a.length;
            document.getElementById('statET').textContent = et;
            document.getElementById('statNDTV').textContent = ndtv;
            document.getElementById('statHindu').textContent = hindu;
            document.getElementById('statOther').textContent = other;
            document.getElementById('statsRow').style.cssText = '';  /* remove !important override */
            document.getElementById('totalBadge').textContent = a.length + ' articles';
        }

        function buildTrending(articles) {
            const stop = new Set(['the', 'and', 'in', 'of', 'as', 'a', 'to', 'for', 'on', 'is',
                'are', 'with', 'at', 'by', 'from', 'that', 'this', 'it', 'was', 'has', 'have', 'had',
                'been', 'be', 'an', 'or', 'but', 'not', 'will', 'its', 'after', 'over', 'amid', 'says',
                'update', 'news', 'live', 'today', 'check', 'all', 'up', 'per', 'how', 'what', 'why']);
            const freq = {};
            articles.forEach(a => {
                (a.title || '').toLowerCase().replace(/[^a-z\s]/g, '').split(/\s+/).forEach(w => {
                    if (w.length > 3 && !stop.has(w)) freq[w] = (freq[w] || 0) + 1;
                });
            });
            const top = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 22);
            const container = document.getElementById('trendingTags');
            container.innerHTML = top.map(([w]) =>
                `<button class="tag" onclick="setTag('${w}')">${w}</button>`
            ).join('');
            document.getElementById('trendingBar').style.display = '';
        }

        function setTag(word) {
            document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
            currentTag = (currentTag === word) ? '' : word;
            if (currentTag) document.querySelectorAll('.tag').forEach(t => { if (t.textContent === word) t.classList.add('active'); });
            displayCount = PAGE_SIZE;
            applyFilters();
        }

        function setFilter(src) {
            currentFilter = src;
            displayCount = PAGE_SIZE;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.source === src));
            applyFilters();
        }

        function applyFilters() {
            let res = allArticles;
            if (currentFilter !== 'all') res = res.filter(a => (a.source || '') === currentFilter);
            if (currentSearch) { const q = currentSearch.toLowerCase(); res = res.filter(a => (a.title || '').toLowerCase().includes(q)); }
            if (currentTag) { const t = currentTag.toLowerCase(); res = res.filter(a => (a.title || '').toLowerCase().includes(t)); }
            filtered = res;
            renderCards();
        }

        function renderCards() {
            const grid = document.getElementById('newsGrid');
            const empty = document.getElementById('emptyState');
            const more = document.getElementById('loadMoreWrap');
            if (!filtered.length) { grid.innerHTML = ''; empty.style.display = ''; more.style.display = 'none'; return; }
            empty.style.display = 'none';
            grid.innerHTML = filtered.slice(0, displayCount).map((a, i) => {
                const cls = srcClass(a.source);
                const link = (a.link || '').startsWith('http') ? a.link : '#';
                const title = esc(a.title || 'Untitled');
                const nested = a.is_nested === true || a.is_nested === 'True' || a.is_nested === 'true';
                return `<div class="news-card" style="animation-delay:${Math.min(i * 0.02, 0.4)}s">
                    <div class="flex items-center gap-1.5">
                        <span class="src-badge ${cls}">${esc(a.source || 'Other')}</span>
                        ${nested ? '<span class="rel-badge">Related</span>' : ''}
                        <span class="ml-auto text-[10px] text-muted-foreground flex-shrink-0">⏱ ${a.time || ''}</span>
                    </div>
                    <div><a class="card-title-link" href="${link}" target="_blank" rel="noopener noreferrer">${title}</a></div>
                </div>`;
            }).join('');
            more.style.display = filtered.length > displayCount ? '' : 'none';
        }

        const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

        function loadMore() {
            displayCount += PAGE_SIZE;
            renderCards();
            window.scrollBy({ top: 400, behavior: 'smooth' });
        }

        async function triggerRefresh() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true; btn.textContent = '⏳ Scraping…';
            document.getElementById('spinner').style.display = 'flex';
            document.getElementById('newsGrid').innerHTML = '';
            try {
                await fetchWithAuth('/api/news-pulse/scrape', { method: 'POST' });
                await fetchNews();
            } finally {
                btn.disabled = false; btn.textContent = '🔄 Refresh';
            }
        }

        // Live search with debounce
        let st;
        document.getElementById('searchBar').addEventListener('input', e => {
            clearTimeout(st);
            st = setTimeout(() => { currentSearch = e.target.value.trim(); displayCount = PAGE_SIZE; applyFilters(); }, 250);
        });

        // Silent re-fetch from CSV every 10 min (picks up background scrape)
        setInterval(fetchNews, 10 * 60 * 1000);

        // Init
        fetchNews();
    </script>
</body>

</html>
