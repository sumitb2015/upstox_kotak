<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indices Dashboard - OI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        background: 'var(--background)',
                        foreground: 'var(--foreground)',
                        card: 'var(--card)',
                        'card-foreground': 'var(--card-foreground)',
                        popover: 'var(--popover)',
                        'popover-foreground': 'var(--popover-foreground)',
                        primary: 'var(--primary)',
                        'primary-foreground': 'var(--primary-foreground)',
                        secondary: 'var(--secondary)',
                        'secondary-foreground': 'var(--secondary-foreground)',
                        muted: 'var(--muted)',
                        'muted-foreground': 'var(--muted-foreground)',
                        accent: 'var(--accent)',
                        'accent-foreground': 'var(--accent-foreground)',
                        destructive: 'var(--destructive)',
                        'destructive-foreground': 'var(--destructive-foreground)',
                        border: 'var(--border)',
                        input: 'var(--input)',
                        ring: 'var(--ring)',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* ── Design Tokens ─────────────────────────────────────────── */
        :root {
            --bg-main: #f8faff;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #4f46e5 50%, #7c3aed 100%);
            --gainer-color: #16a34a;
            --gainer-bg: #f0fdf4;
            --loser-color: #dc2626;
            --loser-bg: #fff1f2;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --card-hover-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.5);

            /* Tailwind semantic vars */
            --background: #f8faff;
            --foreground: #0f172a;
            --card: #ffffff;
            --card-foreground: #0f172a;
            --popover: #ffffff;
            --popover-foreground: #0f172a;
            --primary: #0f172a;
            --primary-foreground: #f8fafc;
            --secondary: #f1f5f9;
            --secondary-foreground: #1e293b;
            --muted: #f1f5f9;
            --muted-foreground: #64748b;
            --accent: #f1f5f9;
            --accent-foreground: #0f172a;
            --destructive: #ef4444;
            --destructive-foreground: #f8fafc;
            --border: #e2e8f0;
            --input: #e2e8f0;
            --ring: #0f172a;
        }

        .dark {
            --bg-main: #060910;
            --bg-card: #0d1421;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            --gainer-color: #00ff88;
            --gainer-bg: rgba(0, 255, 136, 0.08);
            --loser-color: #ff4466;
            --loser-bg: rgba(255, 68, 102, 0.08);
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            --card-hover-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);

            --background: #060910;
            --foreground: #f8fafc;
            --card: #0d1421;
            --card-foreground: #f8fafc;
            --popover: #060910;
            --popover-foreground: #f8fafc;
            --primary: #f8fafc;
            --primary-foreground: #060910;
            --secondary: #1e293b;
            --secondary-foreground: #f8fafc;
            --muted: #1e293b;
            --muted-foreground: #94a3b8;
            --accent: #1e293b;
            --accent-foreground: #f8fafc;
            --destructive: #ef4444;
            --destructive-foreground: #f8fafc;
            --border: rgba(255, 255, 255, 0.08);
            --input: rgba(255, 255, 255, 0.08);
            --ring: #f8fafc;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s;
        }

        .main-content {
            margin-left: 5.5rem;
            padding: 2rem;
            min-height: 100vh;
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                padding-bottom: 5rem;
            }
        }

        /* ── Card Styles ── */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            box-shadow: var(--card-shadow);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s, border-color 0.3s;
        }

        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-hover-shadow);
        }

        /* Glow on hover for gainer/loser cards */
        .dark .gainer-card:hover {
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.18);
            border-color: rgba(0, 255, 136, 0.35) !important;
        }

        .dark .loser-card:hover {
            box-shadow: 0 0 25px rgba(255, 68, 102, 0.18);
            border-color: rgba(255, 68, 102, 0.35) !important;
        }

        .gainer-card:hover {
            box-shadow: 0 0 15px -5px rgba(16, 185, 129, 0.3);
            border-color: rgba(16, 185, 129, 0.4) !important;
        }

        .loser-card:hover {
            box-shadow: 0 0 15px -5px rgba(239, 68, 68, 0.3);
            border-color: rgba(239, 68, 68, 0.3) !important;
        }

        /* ── Gradient Utilities ── */
        .text-gradient {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .active-tab-indicator {
            height: 3px;
            background: var(--accent-gradient);
            border-radius: 100px;
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.4);
        }

        .pill-button {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pill-button.active {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* ── Live Dot ── */
        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            position: relative;
        }

        .live-dot::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: inherit;
            border-radius: inherit;
            animation: pulse-ring 1.5s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.33);
                opacity: 1;
            }

            80%,
            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        /* ── Scrollbar ── */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.3);
            border-radius: 10px;
        }

        /* ── Progress bar animation ── */
        .progress-bar {
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

<body class="antialiased selection:bg-secondary selection:text-foreground">

    <!-- Sidebar Integration -->
    <div id="sidebar-root"></div>
    <script src="/sidebar.js"></script>

    <div id="root" class="main-content"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ── Icons ──────────────────────────────────────────────────────────
        const IconArrowUp = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18" />
            </svg>
        );
        const IconArrowDown = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
            </svg>
        );
        const IconMinus = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M20 12H4" />
            </svg>
        );

        // ── Header ──────────────────────────────────────────────────────────
        const Header = ({ activeCategory, setActiveCategory, isConnected, categories }) => {
            const [time, setTime] = useState(new Date());
            useEffect(() => {
                const t = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(t);
            }, []);

            return (
                <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                    {/* Logo + live status */}
                    <div className="flex items-center gap-4">
                        <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-600 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                            <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                            </svg>
                        </div>
                        <div>
                            <h1 className="text-2xl font-black tracking-tight text-foreground">
                                Indices <span className="text-gradient">Dashboard</span>
                            </h1>
                            <div className="flex items-center gap-2 mt-0.5">
                                <div className={`live-dot ${isConnected ? '' : 'bg-rose-500'}`} style={isConnected ? {} : { backgroundColor: '#f43f5e' }}></div>
                                <span className="text-[10px] font-bold tracking-widest uppercase opacity-60">
                                    {time.toLocaleTimeString('en-US', { hour12: false })} · {isConnected ? 'Live' : 'Offline'}
                                </span>
                            </div>
                        </div>
                    </div>

                    {/* Category pill switcher */}
                    <div className="flex p-1 bg-card/50 backdrop-blur-sm border border-border rounded-2xl gap-1">
                        {categories.map(cat => (
                            <button
                                key={cat}
                                onClick={() => setActiveCategory(cat)}
                                className={`pill-button px-4 py-2 text-xs font-bold rounded-xl ${activeCategory === cat ? 'active' : 'text-muted-foreground hover:text-foreground'}`}
                            >
                                {cat}
                            </button>
                        ))}
                    </div>
                </header>
            );
        };

        // ── Advance/Decline Card ────────────────────────────────────────────
        const AdvanceDeclineCard = ({ advances, declines, categoryName }) => {
            const total = (advances + declines) || 1;
            const advPercent = (advances / total) * 100;

            return (
                <div className="glass-card p-4 mb-6 border-border/40 relative overflow-hidden">
                    <div className="flex items-center justify-between mb-3">
                        <div className="space-y-0.5">
                            <span className="text-[9px] font-black uppercase tracking-widest text-muted-foreground">Market Breadth</span>
                            <div className="flex items-baseline gap-2">
                                <h3 className="text-xl font-black tracking-tighter text-foreground">{advances} / {total}</h3>
                                <span className="text-[9px] bg-indigo-500/10 text-indigo-500 px-1.5 py-0.5 rounded-sm font-bold">
                                    {categoryName} · {advances}:{declines}
                                </span>
                            </div>
                        </div>
                        <div className="flex gap-5">
                            <div className="text-right">
                                <span className="text-[9px] font-bold text-emerald-500 uppercase tracking-tight flex items-center gap-1 justify-end">
                                    <IconArrowUp /> Advances
                                </span>
                                <div className="text-sm font-black text-emerald-500">{advances}</div>
                            </div>
                            <div className="text-right">
                                <span className="text-[9px] font-bold text-rose-500 uppercase tracking-tight flex items-center gap-1 justify-end">
                                    <IconArrowDown /> Declines
                                </span>
                                <div className="text-sm font-black text-rose-500">{declines}</div>
                            </div>
                        </div>
                    </div>

                    <div className="h-1 w-full bg-rose-500/20 rounded-full overflow-hidden flex relative">
                        <div
                            className="h-full bg-gradient-to-r from-emerald-600 to-emerald-400 progress-bar shadow-[0_0_8px_rgba(16,185,129,0.3)]"
                            style={{ width: `${advPercent}%` }}
                        />
                    </div>
                </div>
            );
        };

        // ── Index Card ─────────────────────────────────────────────────────
        const IndexCard = ({ symbol, data }) => {
            const absChg = data.ltp && data.prev ? (data.ltp - data.prev) : 0;
            const chgp = data.chg !== undefined ? data.chg : 0;
            const isGainer = absChg > 0;
            const isLoser = absChg < 0;

            const themeClass = isGainer
                ? 'border-emerald-500/30 gainer-card'
                : isLoser
                    ? 'border-rose-500/30 loser-card'
                    : 'border-border/30';

            const glowClass = isGainer
                ? 'shadow-[0_0_15px_-5px_rgba(16,185,129,0.25)]'
                : isLoser
                    ? 'shadow-[0_0_15px_-5px_rgba(239,68,68,0.25)]'
                    : '';



            return (
                <div className={`glass-card p-3 group hover-lift cursor-default ${themeClass} ${glowClass} relative overflow-hidden flex flex-col justify-between h-[90px]`}>
                    {/* Subtle gradient top accent */}
                    {isGainer && <div className="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-emerald-500/0 via-emerald-500/60 to-emerald-500/0 rounded-t-2xl" />}
                    {isLoser && <div className="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-rose-500/0 via-rose-500/60 to-rose-500/0 rounded-t-2xl" />}

                    <div className="flex items-center justify-between mb-1">
                        <span className="text-[10px] font-black tracking-tighter text-muted-foreground uppercase truncate max-w-[75%]">{symbol}</span>
                        <div className={`p-0.5 rounded-sm ${isGainer ? 'text-emerald-500 bg-emerald-500/10' : isLoser ? 'text-rose-500 bg-rose-500/10' : 'text-muted-foreground'}`}>
                            {isGainer ? <IconArrowUp /> : isLoser ? <IconArrowDown /> : <IconMinus />}
                        </div>
                    </div>

                    <div className="space-y-0.5">
                        <div className="text-sm font-black tracking-tight text-foreground tabular-nums">
                            {new Intl.NumberFormat('en-IN', { maximumFractionDigits: 1 }).format(data.ltp)}
                        </div>
                        <div className={`text-[10px] font-bold flex items-center gap-1 ${isGainer ? 'text-emerald-500' : isLoser ? 'text-rose-500' : 'text-muted-foreground'}`}>
                            <span>{isGainer ? '+' : ''}{absChg.toFixed(1)}</span>
                            <span className="opacity-70">({chgp.toFixed(1)}%)</span>
                        </div>
                    </div>
                </div>
            );
        };

        // ── Categories ─────────────────────────────────────────────────────
        const INDICES_CATEGORIES = {
            "Major": ["NIFTY", "BANKNIFTY", "FINNIFTY", "MIDCPNIFTY", "INDIA VIX"],
            "Broad Market": ["NIFTYNXT50", "NIFTY 100", "NIFTY 200", "NIFTY 500", "NIFTY MIDCAP 50", "NIFTY MIDCAP 100", "NIFTY SMLCAP 50", "NIFTY SMLCAP 100", "NIFTY SMLCAP 250", "NIFTY MICROCAP250", "NIFTY TOTAL MKT"],
            "Sectoral": ["NIFTY AUTO", "NIFTY ENERGY", "NIFTY FMCG", "NIFTY IT", "NIFTY MEDIA", "NIFTY METAL", "NIFTY PHARMA", "NIFTY PVT BANK", "NIFTY PSU BANK", "NIFTY REALTY", "NIFTY HEALTHCARE", "NIFTY CONSR DURBL", "NIFTY OIL AND GAS"],
            "Thematic": ["NIFTY CPSE", "NIFTY INFRA", "NIFTY MNC", "NIFTY PSE", "NIFTY COMMODITIES", "NIFTY CONSUMPTION", "NIFTY IND DEFENCE", "NIFTY IPO", "NIFTY DIV OPPS 50", "NIFTY50 VALUE 20", "NIFTY100 ESG"]
        };

        // ── Dashboard ──────────────────────────────────────────────────────
        const Dashboard = () => {
            const [isDark, setIsDark] = useState(document.documentElement.classList.contains('dark'));
            useEffect(() => {
                const handleTheme = () => setIsDark(document.documentElement.classList.contains('dark'));
                window.addEventListener('themeToggled', handleTheme);
                return () => window.removeEventListener('themeToggled', handleTheme);
            }, []);

            const [stocks, setStocks] = useState({});
            const [isConnected, setIsConnected] = useState(false);
            const [activeCategory, setActiveCategory] = useState("Major");

            useEffect(() => {
                const fetchQuotes = async () => {
                    try {
                        const token = localStorage.getItem('oi_pro_jwt') || localStorage.getItem('token');
                        const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
                        const response = await fetch('/api/market-quote?index=INDICES', { headers });
                        if (response.status === 401) { setIsConnected(false); return; }
                        const result = await response.json();
                        if (result.status === 'success' && result.type === 'stock_data') {
                            setStocks(prev => {
                                const next = { ...prev };
                                for (const [sym, data] of Object.entries(result.data)) {
                                    next[sym] = { ...next[sym], ...data };
                                }
                                return next;
                            });
                            setIsConnected(true);
                        } else {
                            setIsConnected(false);
                        }
                    } catch (e) {
                        setIsConnected(false);
                    }
                };

                fetchQuotes();
                const interval = setInterval(fetchQuotes, 10000);
                return () => clearInterval(interval);
            }, []);

            const currentSymbols = INDICES_CATEGORIES[activeCategory];
            const { advances, declines, filteredStocks } = useMemo(() => {
                let a = 0, d = 0;
                const entries = [];
                currentSymbols.forEach(sym => {
                    if (stocks[sym]) {
                        entries.push([sym, stocks[sym]]);
                        if (stocks[sym].chg > 0) a++;
                        else if (stocks[sym].chg < 0) d++;
                    }
                });
                return { advances: a, declines: d, filteredStocks: entries.sort((a, b) => b[1].chg - a[1].chg) };
            }, [stocks, currentSymbols]);

            return (
                <div className="pb-20 max-w-[1500px] mx-auto">
                    <Header
                        activeCategory={activeCategory}
                        setActiveCategory={setActiveCategory}
                        isConnected={isConnected}
                        categories={Object.keys(INDICES_CATEGORIES)}
                    />

                    {/* Tab-style section header with gradient indicator */}
                    <div className="mb-8 flex items-center border-b border-border/50 relative">
                        <div className="flex gap-8 relative">
                            {Object.keys(INDICES_CATEGORIES).map(cat => (
                                <button
                                    key={cat}
                                    className={`relative pb-4 text-sm font-black uppercase tracking-widest transition-all ${activeCategory === cat ? 'text-foreground' : 'text-muted-foreground hover:text-foreground'}`}
                                    onClick={() => setActiveCategory(cat)}
                                >
                                    {cat}
                                    {activeCategory === cat && (
                                        <div className="absolute bottom-0 left-0 right-0 active-tab-indicator -mb-[1px]"></div>
                                    )}
                                </button>
                            ))}
                        </div>
                    </div>

                    <AdvanceDeclineCard advances={advances} declines={declines} categoryName={activeCategory} />

                    {filteredStocks.length === 0 ? (
                        <div className="flex flex-col items-center justify-center py-32 glass-card">
                            <div className="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-indigo-500 mb-6"></div>
                            <span className="text-muted-foreground text-xs font-black uppercase tracking-[0.3em]">Syncing Market Data...</span>
                        </div>
                    ) : (
                        <div className="animate-in fade-in slide-in-from-bottom-4 duration-700 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-7 gap-3">
                            {filteredStocks.map(([symbol, data]) => (
                                <IndexCard key={symbol} symbol={symbol} data={data} />
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>

</html>
