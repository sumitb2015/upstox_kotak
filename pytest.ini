[pytest]
# Pytest configuration for Windows compatibility

# Disable output capture to prevent I/O errors on Windows
addopts = -s --tb=short --no-header

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ignore manual tests by default (they require live API credentials)
testpaths = tests
norecursedirs = .git __pycache__ venv .venv node_modules

# Markers for different test types
markers =
    unit: Unit tests that don't require external dependencies
    integration: Integration tests that require API access
    manual: Manual tests that require live credentials and user interaction
