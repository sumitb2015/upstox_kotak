version: '3.8'

services:
  app:
    build: .
    container_name: oipro-app
    restart: always
    ports:
      - "8001:8001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      # Persist the SQLite database
      - ./web_apps/oi_pro/users.db:/app/web_apps/oi_pro/users.db
      # Mount strategies for easy updates without rebuild
      - ./strategies:/app/strategies
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:alpine
    container_name: oipro-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
